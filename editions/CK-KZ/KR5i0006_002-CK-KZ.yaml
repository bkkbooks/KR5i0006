front:
  text: 太上道德寶章翼重刋道藏輯要太上道德寶章翼卷下
  hash: sha256:64a9a40c90e44f1be58a31c7ff69ace9cdfe43dc452c670da6ce7d13d9b42b51
  markers:
  - {type: page-break, offset: 7, content: '', id: CK-KZ_KR5i0006_02p001a}
body:
  text: 白玉蟾眞人章句復圭子程以甯闡疏論德章第三十八上德不德無著是以有德不自有其德下德不失德有所窒碍是以無德與道相違病其執著上德無爲無所事於心而無以爲何所爲也下德爲之逐妄迷眞而有以爲道無可爲以德求感便有作爲上仁爲之以心合道而無以爲寂然不動上義爲之以物爲心乃昧所見而有以爲流而忘返上禮爲之道法自然而莫之應去道遠矣則攘臂而仍之自昧其天以禮齊物物終不能齊攙以勢力愈見不齊故失道而後德不能神其神失德而後仁不能性其性失仁而後義不能心其心失義而後禮已失其眞以儀文玉帛爲禮比義又下也夫禮者忠信之薄而亂之首也已非自然前識者道之華棄實得虛而愚之始也不可以知知知卽不知是以大丈夫處其厚不處其薄還湻返朴不求識而求道居其實不居其華收視返聽故去彼取此囘光返照去虛華取敦朴李元素曰上章云道常無爲故次之以上德不德上德無爲故合道下德有爲不合道仁義猶近德可爲近道之階禮者純是作爲多不實以禮齊物物轉不齊蓋有爲終有失也執之不失亦可漸入佳境自仁義而返德自德而返道直造無爲也前識者智識也智識者失道之始故曰道之華有道者不處沈蛟門曰至人無爲去知與故循天之理不言而如神不䂓䂓爲仁義禮而仁義禮時出而不窮應物而無形是謂未始出吾宗上德也得無所得者也惟無所得是以有德也自此而下一涉於心思作爲可名可稱之境若仁義禮者皆爲下德僅能合於守道不失德而已自有得之之名而太朴始漓全體始析其去德也遠矣是以無德又曰道無在而德有在道降而爲德德無跡而仁有跡德破而爲仁仁無別而義有別仁壞而爲義義無飾而禮有飾義衰而爲禮謂之上仁上義上禮非假之者也而弊猶至此又况其假之者乎故禮者忠信之薄而亂之首也忠信在中不言而飲人以和是以父子之間其禮朴而不明恃貌而論情者其情惡也禮者盛揖讓之容繁登降之節倡則必其應施則必其報一有不答則起而相校故禮立而文行實意衰矣實意衰故人懷輕鄙徂詐之心而亂從起矣前識所謂智也仁義與禮皆從此出故特揭道之華而愚之始也是以大丈夫處其厚不處其薄忠信而已矣何以禮爲居其實不居其華道而已矣何以前識爲追踪上德而返自然之朴終不忍舍此而取彼也凡老君之言皆爲明智者辨非與守管籥繩墨者論也故其道爲至道其文爲秘文仁義禮有偏言而道德無偏言仁義禮之名有方而道德之名無方也論大道莫先於道德爲其名渾成而無端論立教莫先於仁義禮爲其名切近而眞實失道而爲德失德而爲云云者猶降祖而爲父降父而爲子云云耳老君詳於上而畧於下明大道之源而息支離之弊將令子子孫孫常以祖宗之心爲心顧子孫眾多老君之言可行於有道之器不可行於凡品是以孔子之教必詳於下使中人以下亦可以循規蹈矩而不爲惡至於性與天道子貢之儔亦云不可得而聞者此也復圭子曰吾儒言道有天人太上言德有上下上德卽天道也不自見德是以無往而非德下德卽人道也執著於德僅不失而已反與自然不合是以無德上德無爲本體淸淨也而無以爲併制作亦不事其結繩之世乎下德爲之澡雪其精神而有以爲則法網漸多其三代之世乎仁則德澤及於民矣苐上仁雖有作爲而卒歸於無爲王者之風也義則裁割斷制之意矣苐上義亦渉意氣而不免多事五霸之風也德有上下而仁義無上下上禮者制禮之初也有應者必有不應者至於攘臂而仍之禮斯下矣吾遡其源道降而德德降而仁仁降而義義降而禮夫禮原以止亂不知者以爲挽澆爲湻息紛爲恬甯知繁文勝而矯僞生雍容盛而武備衰豈非忠信之薄而亂之首乎前識原以破愚不知者以爲宣揚大道化暗爲明甯知眞實喪而浮華顯智識開而羣奸出豈非道之華而愚之始乎夫華者不實實則厚華則不厚安有大丈夫而不處厚乎欲處厚者所當黜禮去識而後大道可幾薛蕙曰程子有言失道而後德失德而後仁失仁而後義失義而後禮則道德仁義禮分而爲五也竊謂老子此言所以究道德之終始而著其厚薄之漸也語其始則一本而已及其終也去本寖遠而德寖異矣誠豈分而爲五而泮然不相合哉且老子之言本爲易見其曰禮者忠信之薄謂之薄矣不曰非忠信也前識者道之華謂之華矣不曰非道也是則老子之言不爲不明豈程子偶未之思乎又議者咸曰仁義禮法聖人治天下之具也老子之學乃欲棄仁義絕禮法使其說行天下惡得不亂乎至於後世士果有尙淸談而廢實行嗜放達而遺名教天下化之遂以大亂如晉人者是已其禍出於祖述老子之道故也議者之云旣不足以知老子之指亦未能盡知晉人之弊也常謂晉人本非老子之學其亂天下蓋有故矣夫老子之學所以棄仁義絕禮學而豈徒哉其棄仁義將以宗道德也其絕禮學將以反忠信也如晉人者吾見其棄仁義矣未見其宗道德也吾見其絕禮學矣未見其反忠信也自太康之後迄於江左士大夫務名高溺晏安急權利好聲伎其貪鄙偷薄極矣若夫尙淸談嗜放達猶其小者耳晉室之亂凡以此也老子之書曷嘗有是哉老子之言曰太白若辱務名高乎强行有志溺晏安乎少私寡慾急權利乎不見可欲好聲伎乎若畏四隣嗜放達乎多言數窮尙淸談乎以此觀之與老子之書若方圓黑白之相反安在其祖述老子之道哉玄同子曰嗚呼三教相成猶如鼎峙固不可互相訾議也自三代之季以至戰國臣弒君子弑父亂臣賊子書於春秋者炳炳又自秦漢以及五代唐宋興亡隆替不可勝紀其間秉阿衡之任據公孤之位假行仁義禮學於朝堂之上乃窮㐫簒移人社稷極惡亂亡人家國殆有甚於晉人者厯代史書又其炳炳如此則程朱爲一代大儒謂宜統爲持論曰某朝祖述孔子其敝若彼某朝祖述老子其敝若此矣而不知皆奸雄之巨者竊堯舜湯武伊周之迹而行其莽操懿師禪逆之禍也若輩之罪天人共忿豈孔子老子大道之過乎此千古定案亦千古快論奈何釋此不議而謬指尙淸談之一晉遂藉爲口實以互相訾議哉嗚呼拒楊拒墨乃戰國不得已之孟子而入此出彼豈吾輩體三聖之素心况吾聞君子不黨君子亦黨乎老子之黨無毁儒之肺肝也去彼取此者去其末而取其本也本者一也故次之以昔之得一法本章第三十九昔之得一者我是何人天得一以淸地得一以甯神得一以靈谷得一以盈萬物得一以生王侯得一以爲天下貞其致之一也昔之得一者天無以淸將恐裂天法道星辰失度地無以甯將恐發地法天山岳崩摧神無以靈將恐歇道法自然歇者消滅無靈谷無以盈將恐竭大道一而已矣萬物無以生將恐滅故去彼取此和氣耗㪚侯王無以爲貞而貴高將恐蹶一點不動萬化自然故貴以賤爲本神者性之基高以下爲基性者心之本是以侯王心也自稱孤寡不穀無所用其用自卑自下此其以賤爲本耶惟道爲身非乎故致數車無車無我不欲碌碌如玉不有其有硌硌如石冥然自全自卑昇高不忘危也數車之名件無一名車者數我之一身無一名我者轂輳一則名車四大合一則名我也復圭子曰昔是何時乃未開闢之時一是何物卽混混沌沌其中有精環之而爲太極直之而爲一一卽道也此一先天地而不老苐得其一以淸一以甯者非天地乎則一之徹上下也此一運神谷而不滯苐得其一以靈一以盈者非神谷乎則一之透隱顯也此一體萬物侯王而不遺苐得其一以生一以貞者非萬物與王侯乎則一之充宇宙也分言之有淸者甯者靈者盈者生者貞者之異合而言之其致之則一耳大哉一乎天可淸而不可裂地可甯而不可發天地不壞卽一不壞也神可靈而不可歇谷可盈而不可竭神谷長存卽一長存也萬物可生而不可滅侯王可貞而不可蹶萬物侯王不輟則一不輟也白祖師註昔之得一者云我是何人潛玩此四字昔之得一者如此如此則今之得一者必不讓天獨淸地獨甯而不裂不發也必不讓神專靈谷專盈而不歇不竭也必不讓萬物偏生侯王偏貞而不滅不蹶也吾將一以貫之無貴無賤無高無下無本無末無大無小無精無粗其致之一也甯有彼此耶不觀王侯至貴也百姓至賤也百姓㪚於下則王侯孤於上非貴以賤爲本高以下爲基乎大修行人以身爲國心爲君精爲民然初入門必先從積精起是貴以賤爲本性者天也常潛於頂命者海也常潛於臍先性則水中捉月先命譬之萬里遠途有路可通故曰高以下爲基是以學道者未得必不憚艱苦以求得旣得當懷無所得之心而不敢露卽侯王自稱孤寡不穀之意也况道原不可道分㪚之則爲仁義禮而不名爲道猶零數車上之物則爲衡爲輪爲輻而不名車也得道之人不可得而貴亦不可得而賤故曰不欲碌碌如玉硌硌如石然則至人將奈何故曰載營魄抱一能無離而已矣非玉非石爲天下璞反者道之動接上章貴以賤爲本之義也安用章第四十反者道之動以性全神弱者道之用以心全性天下之物生於有以我全心有生於無以無我爲全我復圭子曰造化順行六陽六陰循序而進成功而退皆動中之靜惟是建坤之月陰已極矣造化將返而一陽潛萌非道之動乎道體無大不包無小不入本至健也而其用不然陰符云天地之道浸寒暑不驟更百昌盡淍而嵗寒有松栢非其用弱乎天下之物生於有所謂有名萬物之母是已有生於無所謂無名天地之始是已無必生有是故貴其反反者反無爲有也有生於無是故貴其弱弱者不與物爭先也若主持丹道之士知順爲人而逆爲僊返者逆也每於亥子之間駕動河車勾引腎水中金氣心中木液逆流至天谷氣與神合然後下降黃房所謂乾坤交媾罷一點落黃庭則道之動也凡學者剛心猛氣化而不有一味用柔含眼光凝耳韻調鼻息緘舌氣世尊教我觀鼻端白初見鼻中氣出入如煙煙相漸消鼻息成白心開漏盡諸出入息化爲光明其用何弱如之天下之物生於有有欲以觀其徼也有生於無無欲以觀其妙也又曰有象非爲有無形未似無有無俱不立猶是墮偏枯無有有無中得趣方知鬍子沒髭鬚有無相生之道非上士不能無疑故次之以上士聞道同異章第四十一上士聞道勤而行之如無手人欲行拳也中士聞道若存若亡啞者得夢且信且疑似行不行下士聞道大笑之百姓日用而不知也不笑不足以爲道徇迹不徇理故大笑之不知道無跡也故建言有之因理見道明道若昧不昧本來含光匿德進道若退爲道日損瞻前顧後夷道若類不生分別和光同眾上德若谷包含萬化大白若辱大無不包不皎皎以自異廣德若不足惟恐不及君子盛德容貌若愚建德若偷常懷此念一照一用宻而不露質直若渝不自以爲我大方無隅神無方大器晚成道生於萬物之先而成於萬物之後大音希聲無所知覺發之有時大象無形無所名相道隱無名無所可說夫惟道善貸且成能化其化而不自化善藏其用復圭子曰太上言道多言天道而此章曰勤而行之則就人道說矣一陰一陽之謂道了性了命之物是也聞非耳聞之聞乃心聞也上士卽上根之士一聞大道便不憚勤苦忍辱而行之白祖師何以爲無手人欲行拳也意者恐其有法無財乎中士聞道若存若亡疑信相半也下士一聞了性了命之說乃執旁門冥修枯坐反指盗天地奪造化知妙知竅者而非笑之不笑不足以爲道卽知我者希則我貴之謂皆至人之所身親厯也故建言有之建立也前人之立言也以下十三句皆建言明道若昧如愚也進道若退日損也夷道若䫫不見美也上德若谷虛能受也太白若辱與塵同也廣德若不足有若無也建德若偷偷墜也用不勤也質直若渝渝變也善任用也大方無隅不露圭角也大器晚成無欲速也大音希聲非耳得聞也大象無形非目得見也道隱無名復返其樸也已有餘而濟人之乏謂之貸得其貸者可濟其事謂之成夫惟道貸萬物而萬物不知其貸與成此之謂善貸且成陸希聲曰易曰形而上者謂之道道也者通乎形外者也形而下者謂之器器也者止乎形内者也上士知微知彰通乎形外故聞道而信則勤行之中士在微彰之際處道器之間故聞道而疑信相半若存若亡下士知彰而不知微止乎形内故聞道則大笑之不惟笑之且將非之矣夫道也者微妙玄通深不可識苟不爲下士所非笑則不足以爲道矣夫體道者與日月合其貞明而其光不耀斯明道若昧也與天地合其易簡而其用不可爲典要斯夷道若䫫也與四時合其運行而其動必返於玄妙斯進道若退也常處卑下而終不可踰斯上德若谷也常居混濁而終不可湼斯太白若辱也衣被天下而不有其仁斯廣德若不足也生畜萬物而不顯其功斯建德若偷也復其性以御其情斯質直若渝也正乎内而圓乎外斯大方無隅也以若掘之匠陶甄天下而不爲近功斯大器晚成也以不言之教鼓動萬物而不事小說斯大音希聲也事無事莫覩其用斯大象無形也爲無爲莫識其體斯道隱無名也夫惟善濟貸於萬物而不責其報是以萬物受其生成而不知其德可見道之深遠實與常情相反此上士聞之所以勤行中士所以致疑而下士所以大笑不信其能若此耳上士勤行其道故次之以道生一道化章第四十二道生一虛無生一炁一生二一炁生陰陽二生三陰陽合而生三才三生萬物萬物負陰而抱陽成象於天成形於地沖氣以爲和人之所惡惟孤寡不穀而王公以爲稱故物或損之而益或益之而損一切有象謙者受益滿者必溢人之所教無一亦無二我亦教之惟道而已强梁者心念所形起滅不停不得其死不能致於無我之地吾將以爲教父聖人設此戒教人令人克己行謙見不善而自省復圭子曰此先從天地之道說到人道上去道卽無極也虛無生一炁卽太極也一生二兩儀也二生三三才也凡物背止於後陰靜也耳目口鼻居前陽動也植物則背寒向暖而沖氣運乎其間故曰負陰而抱陽沖氣以爲和稟氣於中和也一之名可尊亦可卑尊之則爲無對卑之則爲孤寡不穀不穀不善也人之所惡而王公以爲稱者欲其貴而不忘賤高而不忘下以損爲益也故物或損之而益或益之而損人之所教謂去弱爲强去柔爲剛也我亦教之謂去强爲弱去剛爲柔也夫强梁之所以爲益也而不得其死所損滋大此雖恆言至理存焉人以爲教我亦以爲教豈徒以爲教而已哉殆尊之爲教父則不善人善人之資乎强梁者不得其死剛暴之宜戒也故次之以至柔徧用章第四十三天下之至柔道也馳騁天下之至堅物我也出於無有入於無間大無不包細無不入吾是以知無爲之有益也爲學日益爲道日損不言之教天何言哉無爲之益治身則益神氣治國則益萬民淸靜自然天下希及之眾人昭昭我獨悶悶李元素曰上章孤寡不穀至謙也故次之以至柔謂柔弱勝剛强損中有益損之又損以至無爲不言而可信無爲之益世希及之馳騁役也蘇子由曰以堅御堅不折則碎以柔御堅柔亦不靡堅亦不病以有入有捍不相受以無入有無未嘗勞有未嘗覺求之於物如水之浸潤貫金透石是已是以聖人惟無爲故能役使眾强出入羣有嚴君平曰有爲之爲有廢無功無爲之爲天地是造人物是興有聲之聲聞於百里無聲之聲動於天外震於四海言之所言殊異不通不言之言陰陽化天地感道德無爲而天地成天地不言而四時行自然之驗也復圭子曰以有入有則相觸而有間若以無入有則細無不入入者不知受入者亦不知何間之有以其虛也人悟虛無之有用則知無爲之有益矣無爲之益謂有爲有損名與貨皆有爲者也故次之以名與身孰親身與貨孰多立戒章第四十四名與身孰親不可使之親身與貨孰多不可使之多得與亡孰病不可使之病是故甚愛必大費溺於情慾必喪其本多藏必厚亡累於貪故必失其眞知足不辱大圓覺滿知止不殆應如是住可以長久無量無邊呂吉甫曰烈士之所徇者名也而至於殘生傷性則不知身之親於名也貪夫之所徇者貨也而至於殘生傷身則不知身之多於貨也所得者名與貨而亡其自有之良貴與本來之眞富則得與亡孰病乎復圭子曰人盡知身可愛也而所甚愛者名與利必大費圖名謀利之精神人生多藏於府庫死多藏於邱墓故生有攻刧之憂死有發塚探柩之患人生以得名利爲榮者必以失名利爲辱吾知足而自身圓滿名不可加利不能染何辱之有以名成利遂爲安者必以爭名爭利爲殆吾知止而自身常定不以名利爲安以忘名利爲安何殆之有若而人者逃名利齊得喪屏愛惡超榮辱應無所住而生其心則與天壤相敝可也親身則知足疎名則不辱道成如缺故次之以大成若缺不求全也洪德章第四十五大成若缺自晦其用不敝韜光大盈若沖自然其用不窮澄虛大直若屈順適大巧若拙無爲大辯若訥忘言躁勝寒淸者濁之源靜勝𤍠動者靜之基淸靜爲天下正心無其心是謂大同人能常淸靜天地悉皆歸復圭子曰此章見天地無全功聖人無全能夫天下之物小成者易成亦易敝而天道損有餘以補不足是大成若缺也留不盡之精神以還造化斯造化之生成愈用則愈不敝小盈者易盈亦易窮而天道惡盈而益謙謙虛也沖也是大盈若沖也保有餘之消息以佐太虛斯太虛之闔闢愈用則愈不窮至於直也巧也辯也皆世人之所重而不知小直不屈其直可折而大直不直所謂能大屈者必能大伸也小巧不拙其巧必勞而大巧不巧所謂困天下之智者不在智而在拙也小辯尙口其辯立盡而大辯不辯所謂窮天下之辯者不在辯而在訥也且躁生火也慾勝則火熾而勝寒靜生水也理勝則水降而勝𤍠君子與其暴躁而慾日長毋寧靜定而理日長乎故聖人守其淸靜卓乎若缺若沖之氣象也爲天下正則其用不敝不窮矣此之謂以不勝爲勝吕知常曰天下以不缺爲成故成必有敝以不虛爲盈故盈必有虧以形求之名成者虧以數求之物極則反聖人安於大成而不䘏其缺期於大盈而不惡其沖支離其形而德沖於内謙沖虛儉而常有羡餘隨物之變循理而行委蛇曲折不徇一途所以大直存乎其中匪雕匪琢非篆非刻因物之性自然而成所以大巧存乎中非法不說非道不言辯忘所辯不容其喙所以大辯存乎其中心虛境靜淸亦有餘淸極則瑩靜極則徹靈通十方無碍蓋心淸靜則身淸靜一身淸靜則多身淸靜多身淸靜則盡山河大地淸靜故曰淸靜爲天下正淸靜爲天下正故次之以天下有道有道則自然淸靜儉欲章第四十六天下有道知有此心郤走馬以糞忘其所爲天下無道不知有此戎馬生於郊情欲交戰罪莫大於可欲一念易流禍莫大於不知足迷已逐物咎莫大於欲得豈可更添一物殺身之本故知足之足有情無情同此一理常足矣人人具足個個圓成欲心止意大定豈有禍咎李元素曰上章爲天下正故次之以天下有道有道則淸靜淸靜則天下正天下正則罷兵事務農事故曰郤走馬以糞無道則不淸靜不淸靜則天下不正天下不正則用威武施征伐故曰戎馬生於郊曰罪曰禍曰咎皆欲心所致故結句云知足常足以修身言之淸靜則欲心止欲心止則意大定故曰郤走馬以糞不淸靜則欲心不止欲心不止則意馬狂故曰戎馬生於郊復圭子曰天下有道情歸性也吾心之意馬郤而不馭則靈苗自秀所謂郤走馬以糞也天下無道性逐情也吾身之意馬狂心地荒是戎馬生於郊也凡若此者皆緣心不淸靜嗜欲生心見空成色罪之魁也一念欲生種種諸欲不知止足也禍莫大焉欲之不止勢必欲得未得患得旣得患失心瘁神疲戎馬馳於四郊荊棘生於𤱶畝矣此無他不知足之故也待足而知足無足期矣故知足常足者卽邵子詩云耳目聰明男子身洪鈞賦予不爲貧是也奚必外來之名利多寡爲足不足哉夫苟知之當使我身之三寶勿令虧失而常足也則簞瓢亦足矣有道之士知内不知外故次之以不出戸知天下鑒遠章第四十七不出戸潛心知天下智周萬物不窺牖隳支體斥聰明見天道離形去智天何言哉其出彌遠心見太虛其知彌少神遊萬國外事有限是以聖人不行而知明鏡當空不見而明寶劍在手不爲而成李元素曰不出戸知天下言有道之士知内不知外接上章之義知内不知外則無所不知見内不見外則無所不見若只知外見外而忘其内者知見淺狹矣復圭子曰聖人道全德備學貫天人天下有萬人而無萬性吾自知其性則一人之性千萬人之性是也何必出戸而後知天下哉知非淺淺之知有民吾同胞物吾同與之意天道不外陰陽昇降日月運行而已聖人觀天之道執天之行不窺戸而可見者以在天之天卽在人之天天之性命卽人之性命天人甯有二耶見非鑿空之見有盡心以知性知性以知天之意若必待出戸而後知天下則足力之所及其知甯有幾必待窺牖而後見天道則目力之所到其見甯有幾故曰其出彌遠其知彌少是以聖人不行而知一粒粟中藏世界也不見而明尸居龍見淵默雷聲也不爲而成不動一毫成正覺者也中庸不見而章不動而變無爲而成類此不出戸知天下内知之學也故次之以爲學日益忘知章第四十八爲學日益百尺竿頭更進一步爲道日損空諸所有納諸所無漸漸減損損之又損皮毛剝落盡惟有眞實在以至於無爲空寂無爲而無不爲矣萬化自然若到此地則無有不能者也故取天下常以無事心不在物無物無心事向無心得及其有事物來斯照不足以取天下棄天下如敝屣有心更不得有爲終有盡復圭子曰古之學道者出於一學卽所以學道也今之學道者出於二學主於擴聞見增智識爲學日益精進也主於黜聰明減情欲爲道日損恬退也豈惟情慾着不得當損之也卽智識是金玉屑心中亦着不得當又損之以至於無爲無可損矣無爲而無不爲則心與道合道與虛合何所不虛乎然則天下孰有之虛空有之也虛空孰有之無事有之也聖心無事道器兩忘取天下而置吾太虛之中天下不爲大我心不爲小倘有一事纔着纎塵安足以納天下於方寸李息齋曰爲學所以求知故曰益爲道所以去妄故日損知不極則損不全故日益者所以爲日損也若損之又損妄去眞全則無爲矣至於無爲則凡有爲未嘗不無此又未易以損益論也及其無爲之至雖取天下而有之尙猶不見其事若以有事取之取一物尙不可得而况於取天下乎上章無事取天下故次之以聖人無常心隨機應變不逆民物之情任德章第四十九聖人無常心不以我爲我乃見心中心任用無方以百姓心爲心人心我心同乎一性隨機應感善者吾善之與我同然從而爲善不善者吾亦善之亦與吾同使之反善德善矣同乎自然信者吾信之萬神卽一神萬氣卽一氣從而爲信不信者吾亦信之吾不輕於汝等汝等皆當作佛德信矣誰非此道聖人在天下惵惵無不敬也惵惵競競業業爲天下渾其心忘其所以然殊途同歸百姓皆注其耳目任其耳目聖人皆孩之復圭子曰夫人咸有一定之成心而聖人之心如明鏡止水任物之來姸媸皆其自取先無常心也蓋百姓雖愚合之則聖故聖人以百姓之心爲心上古之世善與不善同途也信與不信同轍也自後世分析太明善者善不善者愈不善信者信不信者愈不信斯亦無爲貴聖人矣是以聖人有道於此提善不善之綱而無善不善之目不善亦化爲善德善矣持信不信之衡而無信不信之權不信亦化爲信德信矣惵惵競競業業也聖人在天下惵惵爲天下渾其心乃已雕已琢復返其樸也卽百姓注耳注目有分別心而聖人無分別想任其善不善信不信而皆孩之視如孺子之可教是以百姓之心爲心也而百姓安得不以聖人之心爲心乎又曰孩赤子也大人不過不失其赤子之心而已聖人視百姓皆赤子則所以愛百姓者無所不至卽釋氏云我不輕汝等汝等皆當作佛之謂也晚近以詐僞視民欲天下之渾其心必不得之數矣李卓吾曰百姓有善不善而聖人皆善之百姓有信不信而聖人皆信之夫聖人曷常有善信之心哉一以百姓之心爲善信故也是爲同德之善而非一人之善同德之信而非一己之信故曰德善德信也夫天下之人各一其心也久矣聖人則合天下之人而渾爲一心百姓皆注其耳目以我觀彼以此觀我各相是非不可一也聖人見此不喜見彼不怒一以嬰兒遇之是以彼亦不矜此亦不愠釋然皆化而天下定矣聖人無常心以百姓之心爲心也如此此太上治世之大旨所以能無爲者哉無常心則渾然應變皆孩之則冥其生死故次之以出生入死貴生章第五十出生入死月圓月缺之類忿欲乃生死之門生之徒十有三月自初三生魄至十五乃圓故曰十有三死之徒十有三月自十六虧至二十八喪魄故曰十有三人之生亦如月然動之死地亦十有三前半月其上旬之十日自初一至初三乃十日之三日其月始生後半月其下旬之十日自二十八至三十日亦十日之三日其月已死夫何故蓋人與月相似以其生生之厚同乎天地之一炁耳害生於思蓋聞善攝生者無思無慮陸行不遇兕虎忘形入軍不披甲兵忘我兕無所投其角身非我有虎無所措其爪我亦非我兵無所容其刃生死者特一炁之聚㪚不厚其生焉能有死夫何故是如此以其無死地此心自若本無生死身非我有死奈我何復圭子曰此章本爲攝生而發出與入對死與生反凡人出乎生則入乎死聽造化爲出入而不能自制其出入故亦聽造化之生死我亦不能自爲生死非善攝生者也太上悲憫眾生方生方死而不能尋一無死地步因爲指點生死之道昔蘇子由云以十言之三等人各居其三豈非生死之道九而不死不生之道一而已矣太上言其九不言其一使人自得之耳子曰一卽末句無死地是也無死地則長生矣䫫天下之人而觀之柔弱者生之徒能懲忿則火下降窒慾則水上昇是水火旣濟者生也水數六火數七七六一十三故生之徒十有三强大者死之徒起忿則無明火熾上升縱慾則苦海波翻下降水火未濟者死也水六火七亦合一十三故曰死之徒十有三又有一等人知重生而不知生生之道所謂豹養其内而虎食其外毅養其外而病攻其内陽過盛則火烈而水涸腎竭矣陰過盛則水溢而火滅心竭矣水火偏枯亦不出七六一十三數故曰人之生動之死地亦十有三何言乎動之死地蓋生生可也而生生太厚則愛之而反爲害所謂害生於恩也出生入死所不免也人之大患以其有身故兕虎可傷兵刃可戕善攝生者吾無有身忘我也任其行任其入至於不遇兕虎不披甲兵則忘物矣角爪無所投措兵刃無所容受所謂無身則無患矣夫何故以其無死地是知死者生之寄生者死之寄也我旣得無生之理又何有入死之地十有三之說解者紛紛惟水火六七之數爲是白祖師箋註作月魄生死上講乃丹家正理未聞道者不解也非天仙引度龍沙會上人安有福德獲此妙解哉愚請發明白祖之說於後出生上半月之月入死下半月之月尙書曰哉生明又曰哉生魄哉始也生明初三日也生魄十五日也自初三至十五恰十三日故曰生之徒十有三自十六一陰生月魄始喪二十三二陰生月魄漸喪二十八三陰純月魄盡喪自十六至二十八恰十三日故曰死之徒十有三以上皆就月說至人之生句以下方借月說到鍊丹者之身上去丹經云望前則血氣滿滿而藥力全望後則血氣減而藥力少以月生死之理而驗人身血氣之盛衰與月不異故曰人之生動之死地亦十有三太上言九留一不言此一卽一陽也丹也人能欲見此一卽於人身方寸之地求之故曰坤地由是坤下添一陽則爲震卦初三也震下添一陽則爲兌卦初八也兌添一陽則爲乾卦十五也爲進陽火乾下而抽一陽則爲巽卦十八也巽下又抽一陽則爲艮卦二十三也艮卦又抽一陽復爲坤卦二十八也爲退陰符乃人身進退抽添火候之妙用夫何故月受日陽氣以生以其生生之厚猶未也聞善攝生之人潛行不溺則陸行有何兕虎入金石不碍則入三軍安用甲兵乘虛如履實則以角爪投措乎虛空虛空必不受以兵刃加臨乎虛空虛空必不容所謂内觀其心心無其心外觀其形形無其形遠觀其物物無其物是也凡人以氣生者氣盡則死至人以性生者也性在虛空無來亦無往夫何故以其無死地道家謂之不生不死釋氏謂之不生不滅常考丹經大修行人以丹田爲日以心中元性爲月日光自返照月蓋交會之後寶體乃生金也月受日氣故初三生一陽丹旣居鼎吾心覺一點靈光或隱或現至初八而二陽產矣丹之金氣少旺元性少現則遍體生明矣月到望而三陽純元性盡現則光不在内不在外而此身如在虛空矣常能如此而金丹且半十六爲一陰產矣性歸於命之始也至二十三日而二陰產矣乃性歸於命之二也至三十日而三陰全矣乃性盡歸於命也方其始也以命取性性全矣又以性安命全丹之士纔見此物分明遂收於鼎器之中所謂性命雙修者此也蓋金日色月性也月明實本於金金之性實出於日月鍊愈堅萬刼不壞火日氣金入火而復其元性可以鍊成至寶號爲金液還丹無死地乃生之以道也故次之以道生之養德章第五十一道生之神也道爲萬物資生之主德畜之性也元始祖炁化生諸天物形之心也有形皆稟道氣而生勢成之我也陰陽相偶四時相因是以萬物物也莫不尊道而貴德忘物道之尊德之貴忘心夫莫之命忘性而常自然忘神故道生之神全德畜之性全長之育之心全亭之毒之我全養之覆之物全如是體道治國治身可也生而不有無心忘機爲而不恃無爲忘情長而不宰無我忘物是謂玄德道也復圭子曰道爲天地根故萬物非道不生道生之虛無杳㝠爲物之祖卽元始祖炁是也然非德不畜畜長養也太和氤氲爲物之母卽化生諸天是也物形之在天成象勢成之在地成形物旣形矣自生而長自長而成自然之勢也觀其成物之功故知其道無位而尊無名而貴乃道體之自然又非有以命之者故曰莫之命而常自然若王侯之尊則受命於天卿相之貴則受命於君可稟命而得者亦可奪之而失豈常然耶道可以兼德德不可以兼道故以下皆言道稟其精謂之生含其氣謂之畜遂其形謂之長字其材謂之育權其成謂之亭諒其用謂之毒作其和謂之養護其傷謂之覆生而不有忘機也爲而不恃忘情也長而不宰忘物也是謂玄德合道也李息齋曰物非道不生非德不畜自其有形以至於勢長莫不以道德爲主道之尊德之貴至於此極矣然不自尊其尊不自貴其貴其施於物非有心於物也莫之命而常自然自然而生自然而畜凡所以長育亭毒以至於養之覆之莫非自然者由其自然故未嘗望物之報生不辭勞施不求報是謂玄德道生德養資物有始故次之以天下有始歸元章第五十二天下有始道生一以爲天下母一生二旣得其母二生三以知其子三生萬物旣知其子夫物芸芸復守其母各復歸其根知末守本沒身不殆歸根復命常在塞其兌聽乎無聽内境不出閉其門視乎無視外境不入終身不勤無爲不勞而治開其兌神若出便收來内境出濟其事惟欲是躭外境入終身不救永絕道根見小曰明虛中則明知幾知微守柔曰强剛中則强軟能蝕堅用其光以心契心物來斯照復歸其明以道合道放去收來無遺身殃心無一塵是謂襲常是謂之道是乃眞常大道復圭子曰首章始字母字兼天地人物而言此章始字母字近取諸人身而言夫無始之先不惟無人且無天地是無極也無能生有天下乃有始矣所謂太始是也卽太極也道也純指理說以爲天下母母亦道也便着炁上說先天眞一之母炁是也人得先天眞一之炁以生在母腹僅一兩及生身之後每𡻕先天之炁長一兩至十五𡻕而先天之炁共十六兩而爲純乾之體矣此炁原我固有何以曰得不知十六𡻕以後乾體破而成離必取坎塡離而後能得彼先天眞一之炁卽眞鉛也得者得到我腹中以知其子子乃子氣卽我後天之氣眞汞也此知不徒知先以兔髓而制烏精耳旣知其子復守其母者何也此守非空守先天炁與後天炁打成一塊後伏烏精以擒兔髓勿使復失也所謂守於坤而採藥守於乾而運火也久久如是則結胎在此脫體亦在此形骸雖沒道炁常存夫何殆之有太上恐人不知入門下手故又云云塞兌神在心而舌不聲也閉門眼不視而魂在肝耳不聞而精在腎鼻不香而魄在肺也塞兌閉門四字乃徹上徹下工夫終身用之可矣夫人有怠始有勤終身不怠則不勤矣若開兌而不能塞内者出也日日涉世以濟事外者入也終身憧憧雖有道者不能救其沒身之苦矣小細微也明字日陽而月陰惟見極細密者方知陰陽精微之理而爲明明天道也守柔卽專氣致柔之柔弱其志之謂也曰强强其骨也又外柔而内剛明人道也用其光用日之光也以月爲藥之丹而採取必按月之盈虧以日爲火之候而動靜必俟日之出沒復歸其明者丹成則與天地合其德日月合其明而歸其明於一已若旁門便孤陰不生孤陽不成無常一旦臨身輙爲身殃豈可如此學道者能按陰陽以修道非奇行也是謂襲人間日用常行之道可以長生而沒身不殆矣奚啻無遺身殃哉又曰兌與門人身上下孔竅之通稱參同契云上閉則稱有下閉則稱無可見閉下門爲尤緊要上章襲常謂密用常道也故次之以介然有知行於大道益證章第五十三使我介然有知一念而已行於大道一我而已惟施是畏一理而已識法者恐大道甚夷一道而已坦平而民好徑思無邪朝甚除心不正宮室修治田甚蕪性不明靈地無苗邪僻有位倉甚虛神不靈靈寶空竭服文采好榮華粧點帶利劍貪嗜慾貪嗔並興厭飲食不知有淡泊饑思啖牛渴思飲海愈食愈不足財貨有餘舍此道而逐物合眼方休是謂盗夸人欲勝天理非道哉於道不然三毒擾攘復圭子曰太上原是上德上德無知也無爲也天下上德者有幾人故不得不談下德之事下德則有知有爲矣介然猶忽然也使我介然有知以行此大道惟施是畏已有所施則彼有所受喪莫大焉行大道之時分明是恍惚之中尋有象杳冥之内覔眞精安得不惟施是畏哉故對境忘境眞色不色非知道者孰敢言之大道本至平至易而民好徑走旁門以求速効欲得大道必不得之數也朝早也除去也朝甚除不知火候矣田甚蕪靈地茅塞矣倉甚虛腹内不實矣外猶服文采火玄人帶利劍以降魔積飲食財貨而無所用之夸誇張也是謂盗夸誇以誨盗卽慢藏誨盗之謂也所以敲爻歌云若是慳財並惜寶千萬神仙不肯來是也豈道也哉蘇子由曰體道者無知無行無所施設而物自化今介然有知而行於大道則有施設建立非其自然有足畏者矣大道夷易無有險阻世之不知者以爲迂遠而好徑以求㨗故凡舍其自然而有所施設者皆欲速者也俗人昭昭我獨若昏俗人察察我獨悶悶豈復飾末廢本以施設爲事夸以誨盗哉上章使我介然有知有知則道心堅固故次之以善建不拔修觀章第五十四善建者不拔不出乎道根深善抱者不脫不離乎道蒂固子孫祭祀不輟以道常存綿遠修之於身心也其德乃眞眞心修身以全眞修之於家性也其德乃餘眞性齊家自寬裕修之於鄉神也其德乃長眞神長久爲尊修之於國道也其德乃豐眞道治國豐亨修之於天下空也其德乃普眞空時亨道泰故以身觀身心中心内有一塵其德不眞以家觀家性中性有一不順其德無餘以鄉觀鄉神中神有一不化其德不長以國觀國道中道有一不善其德不豐以天下觀天下空中空有一小人其德不普吾何以知天下之然哉空中不空以此復圭子曰凡物有形可建者則可從建處而拔之惟修道者不建以迹而建以神斯之謂善建不拔有形可抱者亦可從抱處而脫之惟修道者不抱以人而抱以天斯之謂善抱不脫至人在當時猶能使物不疵厲而年穀豐熟豈弈世而下道氣長存而祭祀之者不如子孫之不輟耶蓋善建非虛建也善抱非空空而無所據也亦以修之於身鍊精還氣鍊氣還神鍊神還虛鍊虛合道所謂心無其心其德乃眞天地間獨有此眞長存不壞耳其誰得而拔之脫之耶號曰眞人身眞則其餘皆眞而家也鄉也隨其所修之親疎其德必至於乃餘乃長也身眞而國也天下也隨其所修之廣狹其德必至於乃豐乃普也故以身觀身不獨眞人有德可修身凡身之皆可修也猶之以家觀家人盡家也以鄉觀鄉人盡鄉也以國觀國人盡國也以天下觀天下人盡天下也吾何以知天下不異於國國不異於鄉鄉不異於家家不異於身哉亦以夫人之身同也德同也特患不知修耳使人能如眞人修德以修身則幻身悉眞身矣何擇鄉邦與天下哉吾所以知其然者以此身眞故也河上公曰修道於家父慈子孝兄友弟恭夫倡婦隨其德如是乃有餘慶及於子孫修道於鄉尊敬長老愛恤卑幼化誨愚鄙其德如是乃爲長者修道於國君明臣良仁義自生禮樂自興其德如是乃爲豐厚修道於天下不言而化不教而治下之應上㨗如影响其德如是乃爲普博然而皆從鍊心修身始故心正身修身修家齊家齊國治國治而天下平矣善建者不拔德之厚也故次之以含德之厚玄符章第五十五含德之厚抱道比於赤子無心純一不雜毒蟲不螫無畏赤子無害於物物亦不能害也猛獸不據無憂攫鳥不摶無虞骨弱筋柔而握固神全未知牝牡之合而䘒作凝神精之至也杳杳㝠㝠赤子不知男女陰陽故能全其至精終日號而嗌不嗄性全和之至也恍恍忽忽氣全而柔和知和曰常常寂光中此天混然知常曰明大光明理不怕念頭起只怕覺照遲益生曰祥靈源不竭益則有損心使氣曰强眞一常存氣動則剛物壯則老人欲太盛剛則易折是謂不道喪失本眞是大錯不道早已眞不立妄不空喪失天眞益生使氣二句白祖作正講至物壯方反說李祖則一直反說下姑兩存之復圭子曰上章言修之於身其德乃眞人之眞者莫如赤子故此章言含德之厚厚卽敦厚之厚比於赤子赤子混沌未鑿不識不知至人亦不過不失其赤子之心耳赤子不知悅生不知惡死故毒蟲不螫不知其螫也猛獸不據不知其據也攫鳥不摶不知其摶也骨弱筋柔而握固不知其不勝任也未知牝牡之合而䘒作其精全也終日號而嗌不嗄其和全也和也者天下之達道也常也赤子以和全眞眾人以利爲貴故用和爲常道知常不變守之自明此含德之厚者也沈蛟門曰䘒赤子陰也嗌咽也嗄咽嗌破而聲嘶也無欲而自作精有餘而非心也終日號而嗌不嗄聲不嘶心和而氣不傷也和者不以外傷内也天以冲氣與人而人保和之以爲性命之常惟此和耳五倫具備曰和夫人於身和則德冲而合眞於國和則化周而祚永處眾和則合禮行師和則有功和之義大矣哉此知和知常而全德自明也祥者吉凶之先兆也人一受形素分已定非理益之必致凶祥莊子曰常因自然而不益生也心有是非而氣無分別氣惡妄作而又以心使之則强梁甚矣强梁者死之徒致虛守靜則道也道乃久歿身不殆致實剛强則物耳物壯則老豈道也哉是謂不道不道早已已止也坐待速斃而已惟含德之厚者和全精復與天爲一長生久視之道也含德之厚則能緘默了悟忘言故次之以智者不言玄德章第五十六智者不言玄德貴知不貴言言者不智玄德口頭三昧難出生死塞其兌閉目見自己之目閉其門收心見自己之心挫其銳觀我非我解其紛觀物非物無爭無競和其光觀心無心同其塵觀空非空無我無人混同一體是謂玄同聖凡一體至玄至妙同然之理故不可得而親釋迦文佛叅禪未已忘情亦不可得而疎太上老君學道未濃忘形不可得而利伏羲究易未了忘物亦不可得而害孔子夢奠方終忘機不可得而貴道者心之體忘有亦不可得而賤心者道之用忘無故爲天下貴一志忘盡眞常獨存乃玄妙同然之體復圭子曰大道渾淪原無知與不知亦不涉言與不言苐人之所得有淺深是以有言有不言耳道非無欲不能觀其妙妙不容言故知道妙者必不言非有欲不能觀其竅竅惟心心相授故輕於洩漏者必不知竅夫道旣不可言矣而非不可行也故聖人自有體道之工夫與其多言數窮不如守中塞其兌也與其多視亂色多聽亂聲不如收視返聽閉其門也道不露鋒芒挫其銳是可方可圓也道不掛障碍解其紛是冰融凍釋也道無我相和其光是被褐懷玉也道無人相同其塵是呼牛卽牛呼馬卽馬也以上數者皆在不言而躬行之中其道至深其理至玄其德大同是謂玄同若而人也不知身之爲道道之爲身指身爲道可指道爲身亦可故不可得而親不可得而疎不卽不離也不可得而利不可得而害寵辱不驚也不可得而貴不可得而賤榮枯不染也况疎原自親中致旣不得而親之又安得而疎之害原自利中來旣不得而利之又安得而害之賤原自貴中藏旣不得而貴之又安得而賤之故爲天下貴貴重也貴其平親疎齊利害一貴賤渾然一眞人也世之學道者苟不能超乎親疎利害貴賤之外而思得道也必不幾矣知者不言得其正也故次之以正治國湻化章第五十七以正治國凝神不偏不倚以奇用兵明心權變之道以無事取天下了性吾何以知其然哉得道以此道也天下多忌諱居移氣養移體而民彌貧此心易失在處觸法治生愈巧則愈拙也人多利器念念伏耀國家滋昬此性不明法日增而亂日起人多伎巧性靜情逸奇物滋起心動神疲末伎所遷法令滋章以心用心盗賊多有百念愈熾故聖人云如是如是我無爲而民自化神之所化不用權謀我好靜而民自正性之所正我無事而民自富心之所富不貴其貨我無欲而民自樸我之所樸草上之風必偃復圭子曰正者道之常也奇者道之變也無事者道之眞也以正教爲治則足以立國之經以奇謀用兵則足以應時之變天下神器不可爲也取天下常以無事及其有事不足以取天下惟體道恬愉無心順物自然而天下歸之矣上古之民忘帝力而不知其所爲何忌何諱後世民動觸忌諱避諱之不暇而何暇治生哉故彌貧古之人有什百人之器而不用車輿無所乘甲兵無所陳其治益醕後世爲符璽以信之人併符璽而竊之制五兵以防暴客人併五兵而盗之所以人多利器國家滋昬李息齋曰我以巧示民則民多伎巧伎巧旣勝則奇物安得不滋我以法治民則民亦竊法以自便上下相䝉則盗賊安得不多聖人示以無爲示以好靜示以無事示以無欲天下各得其所示者報之故曰德猶風也民猶草也草上之風必偃復圭子曰大道本無爲也淸靜也無事也無欲也安有正與奇哉苐修道者不盡上德也以身爲國精爲民吾愛惜其精神而不耗㪚是以正治國也奇陽數也吾之陽神戰退羣陰而不令三尸六賊竊據於中是以奇用兵也天下大也何物大於天下虛空是也非無事不能虛空非虛空不能藏天下聖心無事故能取天下而納於一掬之中吾何以知其然哉以此道而知之一粒粟中藏世界是也夫天下人之所忌諱者死滅也乃動觸忌諱而死滅之期益促非民彌貧乎血氣用事者利器也不知利器乃戕性之斧斤愈令人愈暗而心迷情上生情者伎巧也不知伎巧乃戕性之么魔愈令人形逐而神馳縶心猿拘意馬者法令也不知法令乃招盗之淵藪愈令人三尸猖而六賊熾然則聖人將奈何我無爲而民自化鍊精還氣也我好靜而民自正鍊氣還神也我無事而民自富鍊神還虛也我無欲而民自樸鍊虛合道也何以謂之富虛空中無所不有也何以謂之樸樸者渾然其未雕也精爲民自化自正自富自樸者所謂水銀一味周流遍厯諸辰是也上章無爲無事使民自化寛大之治也故次之以其政悶悶其民醕醕順化章第五十八其政悶悶天然無爲寛裕其民醕醕自然因寛民富其政察察使然有爲嚴謹其民缺缺不然人貪婪而不足禍兮福所倚禍福無門惟心自召福兮禍所伏損者益也忽福則禍必至孰知其極無有邊際其無正道無體惟正可守正復爲奇心不可測善復爲訞道不可識心實難防人之迷昧其本性其日固久無始以來有生以後是以聖人我也方而不割圓通廉而不劌空寂渾厚勝物而不傷直而不肆冲虛能曲全而不狂直光而不耀中正含畜其光天下化成復歸其明王弼曰此皆崇本息末不攻而使復之也復圭子曰上行下效㨗如影響天道好還無往不復悶悶猶昧昧似不明也醕醕是渾厚似無知也察察是吹毛求疵察見淵魚也缺缺是民不聊生欠缺處多也政悶悶者無得在我而有得在民故其民醕醕卓乎有古風政察察者所得在我而所失在民故其民缺缺救死不贍也政悶悶而民醕醕是禍兮福所倚政察察而民缺缺是福兮禍所伏始若爲禍孰知終反爲福始若爲福孰知終反爲禍可見禍福無正良由在人也正者反以爲奇善者反以爲訞是人之顚倒錯亂不知禍福之正非禍福本無正也自聖王旣沒後之爲政者大抵以道化爲迂濶而甘心於刑名鍥薄之術矣民之迷其日固久豈不信然是以聖人則不然方而不割寓正於通也廉而不劌藏淸於渾也直而不肆眞正英雄從戰競中來光而不耀如珠藏澤媚玉韞山輝也以此治人則政悶悶而民醕醕以此自治則至陰肅肅而至陽赫赫此皆從本息末不攻而復之也攝生之道無出此矣政有寛嚴民由禍福禍福倚伏天人之間故次之以治人事天守道章第五十九治人事天以天理勝人欲存心養性莫若嗇儉視儉聽儉思儉爲夫惟嗇儉從約易從簡是謂早服先得此理妙秉機先早服謂之重積德有所操存含德之厚重積德涵養則無不尅尅人欲求天理無不尅克己復禮則莫知其極道如空虛廣大悉備莫知其極道卽心也可以有國性與道合天理在我有國之母神也可以長久神與道存生生不窮是謂深根固柢天崩地裂此性不壞長生久視之道虛空消殞此神不死復圭子曰聰明睿知天也視聽思慮人也吾之視聽思慮無内擾治人也聰明睿智無外馳事天也嗇者有餘不盡之意嗇則能有而無能實而虛宜其可以治人而事天嗇又有而不用之意一嗇則無所不嗇如耳儉聽目儉視口儉味鼻儉嗅心儉思是也早不遠也服者服也復返本還原也嗇則返本還元纔嗇便復也早復則思慮甯靜而故德不損故謂之重積德若己損而後嗇僅足以補失耳德愈積則神愈凝神凝則吾心純是一團天理理淨則欲自化故曰無不尅無不尅則故吾全而我身渾然一太極矣故曰莫知其極國身也可以有國則身始爲吾有矣祖炁是人之母炁爲有國之母也能嗇則不但可以有國而又得其祖炁是得其母也可以長久矣人身上丹田泥丸宮棲神也非後天之神乃先天之元神也下丹田水精宮藏精也樹根深則不拔人以精全爲根深非後天之精乃先天元精也中丹田黃庭宮藏氣也花蒂固則堅實人以氣全爲固蒂非後天之氣乃先天之元炁也是謂深根固柢長生久視之道柢音帝木之直根也神全爲妙合妙合虛也虛則合道矣鍊虛合道爲聖諦第一義卽釋家最上一乘之法淸菴李祖曰接上章其政悶悶之義治人事天莫若從儉以國言之省刑罰薄稅歛以身言之省言語節飲食以心言之省思慮屏視聽盡其心養其性可以事天也事天積德有國之母故次之以治大國居位章第六十治大國盡其心者知其性若烹小鮮治心亦甚易不敢妄動以道蒞天下道不遠在身中淸靜無爲其鬼不神無妄陰魔俛首使剛暴無所施其能非其鬼不神幻盡圓覺其神不傷人心境兩忘物我一空邪不干正使强梁無害物之心非其神不傷人爾爲爾我爲我不恃威網聖人亦不傷人於我何有大制不割夫兩不相傷心復何故形神俱妙上下以德相交故德交歸焉惟道而已道德感通復圭子曰治大國是治身也身有性情有精神先要全其性完其本來面目而不以人爲害之恐傷性也若烹小鮮者不敢妄動恐傷鮮也以道蒞天下欲人人不戕其生不賊其性無干陰陽之和是聖人與天地同心矣鬼神感其明德方爲聖人用而不自用安見其神也道高一尺魔高一丈吾幻盡而眞全則陰魔亦化爲陽神非其鬼不神其神不傷人神卽我之分神也鬼屈而神伸聖人出有而入無是兩不相傷也形神俱妙故德交歸焉則聖人與鬼神合其德也德交歸者能謙能下故以大國者下流次之謙德章第六十一大國者下流以大就小天下之交以小就大眾高附下天下之牝無大無小眾剛附柔牝常以靜勝牡以靜制動以靜爲下無事眾動附靜以靜下人故大國以下小國不競則取小國靜定歸心小國以下大國處順則取大國此理固存容於人也故或下以取靜心或下而取止觀大國不過欲兼畜人神者萬化之主小國不過欲入事人心者道之源理順承上夫兩者卽心是道上遜下順各得其所欲神亦道性亦道各當其分故大者宜爲下除垢止念更宜謙下復圭子曰此章全是借勢喻道柔勝剛靜勝動天下自然之勢也亦理也道也吾且以其勢言之上善若水水下流不爭先故疾而不遲大國者下流不擇細微無上人之心則可以合天下之交牝之道常以靜制牡以靜下人所謂靜爲躁君是也大國能下小國則小國附之小國能下大國則大國納之有作大吞小小吞大說亦可或大國以下而取小或小國因下而取大夫旣已稱大國矣復何加哉不過欲執牛耳爲盟主示廣大以明得意兼畜人而已小國欲修職貢以事大國免侵凌豈無觀釁而動之念哉此兩者各求得其所欲大國德之則委心聽命不德則轉事他人若大國失一小國天下因之擕貳豈大國之福哉故曰大者宜爲下此聖人執謙卑以自牧處上而下下處下而益下以此道而修身心愈下而道愈高身愈退而德愈進謙尊而光卑而不可逾此大者宜爲下之意也大國謙下抱胞與之道故次之道者萬物之奥爲道章第六十二道者萬物之奥心者造化之源善人之寶一滴眞金源流天造至尊至貴前無古人後無來者不善人之所保人各有心此心常存皆頼此道美言可以市至言如寶足以悅眾尊行可以加人道可貴人之不善昧道何棄之有道亦在亦可使之反善故立天子心也置三公神氣精也作之君作之師雖有拱璧以先駟馬世之所貴不如坐進此道我之所寶道尊德貴古之所以貴此道者何在我本然不曰求以得不離乎心見成有的有罪以免耶純一如初復還全體故爲天下貴道者萬物之奥蘇子由曰凡物之見於外者皆其門堂也道之在物譬如其奥物皆有之而人莫之見耳夫唯賢者得而有之故曰善人之寶愚者雖不能有然而非道則不能安也故曰不善人之所保蓋道不遠人而人自遠之今誠有人美言之則可以爲市於世尊行之則可以加於人矣朝爲不義而夕聞大道妄盡而性復雖欲指其不善不可得也而又安可棄之哉立天子置三公將以道救人耳雖有拱璧之貴駟馬之良而進之不如進此道之多也道本在我人患不求求則得之矣道無功罪人患不知知則凡罪不能污也復圭子曰道生萬物有萬物而道斯顯舍萬物指道而道益奥奥玄也深也玄深而不可窺非有道者安能測其奥妙耶善人學道者也道不外性命善人以此爲寶而珍重之故終爲我有不善人囿於道者也非斵喪其眞寶卽輕弄其命寶安可不保之而勿失耶所以不知道者惟無善言與尊行爲之導耳夫一言之美且可以示訓而人無不悅從者一行之善且可以遵行而人無不加敬者况此大道人皆可修豈因其不善而遂棄之耶故學仙須是學天仙惟有金丹最的端遍訪仙師倘得其人立爲天子以主持丹道惟其命而莫之爲也古云眞仙易得伴侣難求又要廣覔雲朋選上根利器三人爲伴侶是置三公也三公謂太尉司徒司空主佐天子理陰陽親萬民廣教化者也資之以調和鼎鼐爕理陰陽以輔佐主持丹道者同登彼岸如天子之三公也拱璧合拱之璧駟馬一乘之馬古者進謁必有以先之駟馬陳於外而執拱璧以先入故曰拱璧以先駟馬立天子以下四句乃古語古人以拱璧駟馬爲極貴重雖有拱璧以先駟馬不如坐進此道者見璧馬爲輕而此道爲重所以然者何也此道人人本具是以求則得之有罪謂陰陽之患得道則個個圓成而逃出陰陽之外非有罪以免耶故拱璧駟馬非貴重也惟得此奥妙之道始爲天下貴耳故曰道者萬物之奥也得道之奥者爲天下貴無爲之效也故次之以爲無爲恩始章第六十三爲無爲心也藏神於神事無事性也藏心於心味無味神也藏形於形其味幽長大小多少總在其中倒行逆施報怨以德心不外物所施惟德不知有怨圖難於其易抱一其微易㪚爲大於其細執中涓涓易塞天下難事道也必作於易此心從微至著天下大事神也必作於細此心積小成大是以聖人終不爲大不自知其大小不自聖而人聖之故能成其大性等虛空夫輕諾必寡信易悟則易疑易得則易喪多易必多難大迷之下必有大悟是以聖人猶難之不可說破故終無難欲其自得得之難失之難李息齋曰爲無爲則己不勞事無事則人不煩味無味則物不費世所謂大小多少者以形言也聖人遊於形器之外故大小多少等而爲一夫大小多少尙等而一之又况於恩怨報施之間乎吾所謂施者惟德而已豈知其有所怨豈知其有所報者哉旣無恩怨報施之別又無大小多少之異其於天下之故豈有心於爲之哉事必求易大必由細自易而往則難者亦易自細而行則大者亦細是以聖人終不爲大而大必歸之者由其無心也惟其無心於事故未嘗先事而期於物豈若世之小夫已未爲而先諾事未至而多易先諾則必寡信多易則必多難聖人於事未至則嘗若難之非難之也不以我必於物故若難之惟其難之故終無難復圭子曰萬物皆有爲有事有味而主張此有爲有事有味者非有也無也惟聖人得道之奥能以無而藏有爲無爲不擾其心也事無事不鑿其性也味無味不驚其神也方且齊大小一多少渾報施平怨德謹易中之難愼細中之大以天下難事必作於易天下大事必作於細也夫域中有四大道大天大地大王亦大而聖人終不爲大也何物大於天地虛空是也聖心至虛故能藏天地於虛空而成其大也世之易於諾者必難於信况學道大事從旁門按摩吐納存想閉息諸家皆易遇而難成是以聖人鍊金液還丹須要洞曉陰陽深達造化方能追二炁於黃道會三性於元宮攢簇五行和合四象始得玄珠有象脫胎神化是以聖人猶難之故終無難呂祖云東華木姓老仙翁獨坐長房未有功忽遇西王金聖母靈丹一粒便騰空所謂難遇而易成者是也聖人猶難之宜持安於易故次之以其安易持守微章第六十四其安易持道可恃其未兆易謀道可思謀始其脆易破道可悟其微易散道可一圖大於細爲之於未有不知其始防於未然治之於未亂不見其尾合抱之木如道也生於毫末防微杜漸九層之臺如道也起於累土從微至著千里之行如道也始於足下在我自到遠起於近爲者敗之道不可窮貴在自治執者失之道不可得是以聖人無爲與道合一故無敗千古不朽無不克無執與神合無故無失萬世常行善抱不脫民之從事不知自然有所施設常於幾成而敗之有爲者亦有敗不謹其始焉得其終愼終如始知此心卽道心則無敗事無爲者無成敗初心不昧焉得有敗是以聖人欲不欲無爲欲人之不欲不貴難得之貨道無玄妙學不學無事學人之不學復眾人之所過覺空覺滿人之所過聖人之所復也以輔萬物之自然與時偕行而不敢爲性空識法者恐復圭子曰眾人逐於物能見已然不能見將然惟修眞志士正心於安靜之始抑情於未芽之初易持易謀也攻人欲於弱植之時消塵垢於涓滴之間易破易㪚也安也未兆也而持之謀之則是爲之於未有矣脆也微也而破之㪚之則是治之於未亂矣此所謂圖難於易也合抱之木生於毫末道之變化基於致曲也九層之臺起於累土道之高明根於無息也千里之行始於足下道之高遠發於卑近也此所謂爲大於其細也以上皆謹始之事以下復言愼終之事道不涉造作稍加人爲未有不敗者道不涉方隅稍涉膠執未有不失者惟聖人無爲故無敗善建者不拔也無執故無失善抱者不脫也民之從事不免有爲有爲則有成敗矣愼終如始則無成敗惟一有恆而已天道有恆則長久聖人有恆則無息修眞有恆我卽道道卽我心卽道道卽心與天壤俱敝可也豈有敗事者哉是以聖人非無欲也欲人之所不欲眾人之所賤聖人之所貴也若夫難得之貨有不欲矣聖人非無學也學眾人之所不學眾人之所過聖人之所復也若夫因循之學有不學矣復卽復禮之復復者復其常也若能復則過歸於無過矣以輔萬物之自然而不敢爲亦欲人人如吾之欲不欲學不學而無爲也李息齋曰譬如合抱之木生於毫末九層之臺起於累土千里之行始於足下於無爲之中自然而爲於無積之中自然而積累日益去善日益積而聖人未嘗知也若有意爲之卽爲敗之有意執之卽爲失之由其無爲故無敗無執故無失吳幼淸曰愼終如始又承上章終無難與終不爲大二終字而言始雖以爲難至終而不以爲難始雖不敢以爲大至終而自以爲大則事幾成而敗於終者有矣故必愼終如始始以爲難而終亦以爲難始不爲大而終亦不爲大則終無敗事上章無爲無執而不敢爲故以古之善爲道者次之湻德章第六十五古之善爲道者我也非以明民不使其有知將以愚之昬昬默默其政悶悶民之難治心亂以其智多靜而易昬動則易㪚其政察察故以智治國國之賊覺亦是念導之以智其民不足不以智治國國之福無所覺知而已導之以德其民有餘知此兩者亦楷式道貴如愚愚中不愚寛則得眾盡法無民能知楷式抱虛守沖是謂玄德教文合道玄德深矣遠矣道爲萬化之宗與物反矣道在萬化而非萬化我貴德物貴智德與智相反然後乃知大順萬物出乎道而入乎道逆行順化劉仲平曰不以智治國開天者也以智治國開人者也開人則鑿鑿則失於太察其民所以不厚而缺開天則順順則行其所無事其政所以不嚴而治故以智治國國之賊不以智治國國之福楷模也式法也當知智者爲賊不智者能爲福是治身治國之法式也能知楷式是謂玄德玄天也與天同德也下徹曰深傍周曰遠反乃順也温公曰物情莫不貴智而有玄德者獨賤之雖反於物乃順於道復圭子曰此章分明是爲治身而發非言治民也觀首句古之善爲道者一句便知宗旨非以明民不可使知之也將以愚之卽前塞其兌閉其門之謂也夫人目淫於色耳淫於聲一身精氣不保而難治者非無知識之民乃民明而智多之故耳身猶國也心猶君也故以智治國日鑿一竅而渾沌死非國之賊乎不以智治國已雕已琢復反其樸而元精完非國之福乎此兩者相提而論知之非難眞能知爲難故能知不以智治國爲楷式是謂玄德可以爲天地始者此也可以爲萬物母者此也深矣遠矣卽玄之又玄之謂也豈物之所可倫乎蓋物情尙智而順乎物者逆乎道也大道若愚而與物反者與道合也行日蹈水火不傷入金石不碍足徵善爲道者以至大順之境矣善爲道之士卑以自牧乃至大順故以江海爲百谷王次之後已章第六十六江海所以能爲百谷王者心所以能合道以其善下之虛而能容寂而不見故能爲百谷王心爲萬物之主是以聖人欲上民使人知道必以言下之示之以無自退自謙之意欲先民使契乎道必以身後之先忘其心克己自治是以聖人處上而民不重道大民忘其勞處前而民不害性空民忘其死是以天下樂推而不厭與物無碍中心悅服以其不爭不與物競故天下莫能與之爭我之自然天下和平復圭子曰攝生之士以養氣爲主中丹田卽氣海也仙彥曰欲得長生須久視久視於上丹田則神長生久視於中丹田則氣長生久視於下丹田則形長生然而神卽火也氣卽水也又曰凝神入氣穴氣歸元海夀無窮也人身以氣海爲眾竅之所歸附亦猶江海以善下爲百谷之所朝宗卽上善若水之義也善爲士者沈潛不露以下爲上寓先於後克己復禮也處上而民不重處前而民不害天下歸仁也天下樂推而不厭猶百川之歸附於江海也水流而心不競故疾而不遲聖心與物無競故天下亦莫有與之競者呂註江海之所以能爲百谷王者以其善下之故能爲百谷王則能爲天下王者亦善下之而已有玄德者乃所以下下之道也莊周以爲以此處下則玄聖素王之道而舜之在下則曰玄德升聞則玄德者固聖人所以處下之道也以處下之道而居人上乃所以下之也聖人之有天下也以言其位則固欲上人也然以孤寡不穀爲稱而受國之垢與不祥則以其言下之也以言其序則固欲先人也然迫而後動感而後應不得已而後起則以其身後之也夫惟以其言下之則處上而民不重不重則以戴之爲輕矣以其身後之則處前而人不害不害則以從之爲利矣不重不害此天下所以樂推而不厭也夫以其言下之以其身後之則不爭者也樂推而不厭則天下莫能與之爭者也非體玄德者其能若是乎故曰夫惟不爭故天下莫能與之爭不爭之量其道最大故以天下皆謂我道大次之三寶章第六十七天下皆謂我道大道大性空萬物惟尊似不肖如愚夫惟大故似不肖默默似個甚麽若肖久矣其細也夫不可分別纔可比便不大我有三寶道尊德貴保而持之道不離我一曰慈專氣致柔能如嬰兒仁惠二曰儉少私寡慾節約三曰不敢爲天下先忘其所以忘我謙退夫慈故能勇其力大無不克儉故能廣其量深無不備不敢爲天下先故能成器長心廣體胖無有不服今舍慈且勇逐物逞强舍儉且廣貪嗔愛慾逞而且縱舍後且先急欲求成恃强梁死矣不見乎道死之徒夫慈仁也以戰則勝身心不動以守則固靜以待之仁則能守天將救之其應亦然惟德是輔以慈衞之乃與道合天地大德曰生聖人守位曰仁復圭子曰此章是太上自描寫其道德非泛泛言也愚於千百世之下猶能想象於千百世之上不啻謁太上於牆間也似如也肖像也不肖愚也夫天大地大天下皆謂我道大似天地不知我其如愚也哉夫惟道大故我似不肖道也若以我爲肖道我其細也夫非大也夫道尊而德貴大無不有我特有道之三寶而已寶而持之非富貴也非金玉也亦非玄之又玄也一曰慈體天地生生之心保全性命如履氷也二曰儉法天地收歛之意愛精神如捧盈也三曰不敢爲天下先效天地謙虛之德守遜讓而未遑也夫惟眞慈者屈於理而不屈於欲無欲故剛能勇也惟眞儉者嗇於妄而不嗇於誠無妄故裕能廣也惟眞謙者怯於悻悻自好而不怯於以道器自任任重故成其爲器長也若如世人舍慈而勇可謂勇乎舍儉而廣可謂廣乎舍後而先可謂先乎秪死耳夫慈以戰則勝所謂戰罷方能見聖人也以守則固所謂大小無傷兩國全也倘毫髮差殊戰不勝而守不固天猶見憐而多方以護衞之鑒其慈也悟眞篇云大藥修之有易難也知由我亦由天若非積行修陰德動有羣魔作障緣董思靖曰此假用兵以明道貴在於守慈也或云若以人身言之則邪念多於敵國利欲勝於鋒銛盍亦寡欲以至於無欲以全其所寶乎以慈衞之故次之以不武不怒以明不爭之德配天章第六十八善爲士者不武慈和善戰者不怒寛泰善勝敵者不爭安稳謙讓善用人者爲之下小心翼翼卑遜是謂不爭之德順帝之則至謙是謂用人之力天理自見至柔是謂配天此心爲大至慈古之極大道乃明合道蘇子由曰士當以武爲本而行之怯若以武行武死矣聖人不得已而後戰若出於怒是以我故殺人也以我故殺人天必殃之以吾不爭故能勝彼之爭若我出於爭則未必勝矣人皆有相上之心故莫能相爲用誠能下之則天下之人皆吾用也釋德淸曰此章言聖人善於下人以明不爭之德釋上三寶之意也一章主意只在善用人者爲之下一句乃假兵家戰勝之事以形容其慈乃不爭之至耳復圭子曰士戰士也戰士必武必怒必爭兵家之常也善爲士者獨不然不武非全無武也所謂兵莫慘於志而鏌鎁爲下也不怒非全無怒也所謂迫而後動不得已而後起也不爭非全無爭也所謂將欲取之必姑與之也皆非正意主意在善用人者爲之下一句無論行兵治國必出此道分明欲學道者亦當着心爲之下所謂識浮沉明主客是也若乾上坤下正位則爲否而萬物不生乾下坤上則爲泰是天在上而用在下也聖人身處人上而心在人下百姓不識不知忘帝力於何有是謂不爭之德先師而後臣跪拜而後推轂是謂先下人而後用人之力故不勞聰明而天下治天之道不爭而勝無爲而成聖人德合於天故曰配天此上古極致之道故曰古之極接上章不武故以不敢爲主而爲客次之玄用章第六十九用兵者有言吾不敢爲主而爲客忘我不敢進寸而退尺不敢有所爲謙退是謂行無行爲無爲不武攘無臂事無事不怒仍無敵守無守不爭執無兵味無味爲下禍莫大於輕敵見聞知覺常下心息勇於敢則殺輕敵則幾喪吾寶照見生空强梁者死之徒故亢兵相加我自我物自物哀者勝矣一曰慈仁人之兵天下無敵釋德淸曰此章多在用兵上説故不得老君之意觀首一句乃借用兵之言至輕敵喪寶則了然是釋上慈字以明不爭之德耳吳幼淸曰用兵有言是用兵者常有是言也爲主如春秋征伐之盟主也爲客如春秋諸侯應接之師也進寸難進也退尺易退也不爲首兵但爲應兵故不敢近進甯於遠退進戰者整其行陣攘臂而怒前進就敵執其兵刃仍就也不行則雖有行如無行不攘則雖有臂如無臂不就則雖有敵如無敵不執則雖有兵如無兵雖動干戈而猶之無動干戈未嘗有殺人之心而無失吾寶者也輕敵樂戰則吾心與物相刃卽戰勝何獲焉故兩兵相加有哀憐勿喜之心者先勝蓋天將救之以慈衞之哀者得人故也復圭子曰此章借用兵以明火候也大修行人入室行持鼎鑪在前彼爲主浮也我爲客沈也所謂用將須分左右軍饒他爲主我爲賓是也昔大禹惜寸陰吾人當惜分陰分寸之間天仙相傳之火候也行火如行兵故謂行無行如無手人能行拳故曰攘無臂如敵在前而非眞敵故曰仍無敵提起我身中無刃鋒芒劍故曰執無兵禍莫大於輕敵勸君臨陣休輕敵是也輕敵則喪吾寶恐喪吾家無價珍是也亢者逆也順則彼爲客而我爲主勝在彼也哀者慈也悲也亢兵相加木愛金順義金戀木慈仁故哀者勝矣哀者勝謂仁慈自然無敵故次之以易知易行知難章第七十吾言甚易知心而已甚易行道而巳天下莫能知不知心信不及也莫能行不知道力不及也言有宗無爲開口顯道事有君無念舉動見道夫惟無知㝠然是以不我知我卽是我尙復何有見不明知我者希知我則知有此理孰是知音則我貴矣我亦非我道亦非道是以聖人知我無我被褐懷玉終日如愚内藴道德外行卑下復圭子曰大道甚夷而民好徑豈以聖人皆人所不能知不能行耶不知太上所言所行皆性命之正理日用尋常甚易行而易知者胡人莫能知而信不及莫能行而趨旁門乎一部道德經或正言或寓言或顯言或隱言總之殊途而同歸故曰言有宗天下窺其宗者誰乎或藏正露奇或闡常含變或緣天證人或因外表内總之百慮而一致故曰事有君天下得其君者誰乎此易知易行有宗有君八字括盡金丹之旨學者當先於易知易行上歸根復命又於易知易行内覔宗覔君斯得深根固蒂之道矣夫道卽我也知道卽知我矣奈何世無知道者安望其知我乎要之我之道原平易非貴也苐物以希爲貴知我易知易行者希則反以我有宗有君爲貴矣是以聖人被褐和光同塵也懷玉我有三寶也如被褐而不懷玉所謂鼎内若無眞種子猶將水火煮空鐺斯亦無爲貴聖人矣接上章吾言甚易知以見聖人眞知之妙也知病章第七十一知不知上吾所謂知知與不知不知之知乃是眞知不知知病知知一字不圓不知道而言知者是妄知夫惟病病病在於知惟恐有知是以不病塵去光生終無妄知聖人不病無念之念亦復如是知如不知以其病病一念不存此心乃見忘其所知是以不病三界一切無所不知復圭子曰聖人之於大道果且有知乎哉先說無知則不能入道後說有知則不能得道聖人始以無知遣其有隨以不知遣其知萬法歸無無亦不立非上而何世人於虛空之中橫生意見淸靜之内忽起山河揑目生花迷頭認影不知中之妄知爲病也久矣若知妄知爲病而病其病則妄知之病瘳矣聖人所以知如不知而不病者以其病其多知是以不病也不知知病所以無忌憚故次之以民不畏威也愛己章第七十二民不畏威人不能究心無忌憚大威至矣死生大事無常迅速自作自受無狹其所居神無方毋離淸靜而行躁欲所謂居天下之廣居無厭其所生性無滅棄謙後而任威權夫惟不厭道無盡不自厭是以不厭心無形人不厭道道不厭人是以聖人自知不自見如魚飲水冷暖自知聖人不放肆其情自愛不自貴無法可設無道可得推巳及人不自厚生故去彼取此自知不自見自愛不自貴復圭子曰傷生之事非一而縱情者必亡人之所取畏者衽席之上名利之韁小威不畏死亡立見大威至矣居處也厭足也人生往往以高梁大厦之室爲居非窄也百年易足之生爲夀非促也甯知我淸靜無爲身藏法界心包虛空可狹其所居乎甯知我謙後不盈生者易滅而生生者不滅可厭其所生乎我不厭其生愈久則愈有全生之道生亦不厭我長存則長有延命之術是以聖人自知弢光不表表示人以見於外自愛韞玉不切切貪生以貴於人内有自知自愛之實外無自見自貴之迹所無者所去也所有者所取也民不畏威故次之以勇於敢則殺也任爲章第七十三勇於敢則殺有力於翦除妄念也强梁者死之徒勇於不敢則活有力於守雌抱一也柔弱者生之徒此兩者能殺能活或利或害吾道如劒不能持者傷鋒敗刃有殺有活天之所惡貴乎無所用造物不容孰知其故道本空相知則不敢是以聖人猶難之道易知而不易於行心易悟而不易於了不敢輕示天之道吾心而已不爭而善勝無爲不與物競物莫能勝不言而善應無念大音希聲和之則應不召而自來無著寂然不動感而遂通坦然善謀無無亦無任用自然無所不克天網恢恢何物不在此道之中包羅無外疎而不失此道常在萬物之内雖疎濶物莫能逃沈蛟門曰夫見義爲之之謂勇自勝之謂强至人之所謂勇勇於慈勇於仁耳勇於敢則不慈不仁殺機旣動安能庇其身勇於不敢則慈仁得之安得不活其身此理之常也然天下事亦或以敢而反生或以不敢而反死世人疑之遂謂天道無知人之所以失懽於天而天之所以惡人者雖聖人猶難言之非難言難爲人一一言也列子曰迎天意揣利害不知其已患天道之難知也雖然天豈終難知哉不與物爭於一時而勝之以久不諄諄與人言而應之如響不待禱求請召歆然來格坦然平易不迫而其經營謀度之處非人思慮之所能及王法雖宻猶有幸而逃誅者天網疎濶恢恢大矣豈但漏吞舟之魚然要於終而必勝之吉凶禍福毫釐不爽天豈不可知哉復圭子曰此章是太上教人學道工夫始入門時護生須是殺殺盡始安居祖師云斬魑滅魅多長生故勇於敢則殺殺是殺妄念也及其有所得後專氣致柔能如嬰兒用力於知雄守雌所謂魄滅魂昌故勇於不敢則活活是神活也此兩者一以剛爲剛一以柔爲剛或毫髮不差則無往而不利或對境着境未免有傷而損害矣雖曰天道福善而忌盈然天之所惡孰知其故道之成與不成不敢必也惟有積功累行而己中人之難難於一刀兩斷聖人之難非敢也猶以勇於不敢爲事所謂知之非難而行爲難善始非難而克終爲難也况中人乎欲明人道先須識天道不爭而善勝是不勝以人而勝以天吾法之而氣化也不言而善應是不應以口而應以事吾法之而念化也不召而自來是寂然不動感而遂通吾法之而神存也坦然善謀任用自然無所不克吾法之而神化也何物大於天虛空是也何物容乎虛空聖心是也故天網恢恢大也造化雖宏能包有形不能包聖人之無形疎而不失密也陰陽雖妙能役有氣不能役聖人之無氣人生至此縱橫自在升玉京朝帝闕方爲大丈夫功成名遂之日也學道如是甯不快哉勇敢則殺常不畏死故次之以民常不畏死惑章第七十四民常不畏死此念不化此道不全肆情逐妄奈何以死懼之海枯終見底人死不知心若使民常畏死只知貪生不知有死而爲奇者死生亦大矣吾得執而殺之安能殺其心哉孰敢其心使之自殺常有司殺者殺心爲司殺能絶百念夫代司殺者殺我心與他心雖同不可以我心代他心也是謂代大匠斵絶生思維便成擬議夫代大匠斵事物之來情慮之及希有不傷其手矣謹者不言言者不知張耒曰夫人之生不殺於衽席飲食疾病則殺之於盗賊刑戮者過半矣是人之死實未嘗知畏也而畏民者不過示之以死亦惑矣苟畏死耶則吾取奇衺者而殺之宜民孰敢爲奇以取戮也然而爲者不止則死之不足以懼民也明矣沈蛟門曰萬物生於天而殺於天惟天司生亦惟天司殺人與人等耳無殺人之權也人而殺之是代司殺者殺代司殺者殺譬以拙工而代大匠斵鮮不傷其手矣烏能不殺其身哉復圭子曰人生於天地間死其身者常有而死其心者不常有夫民非犯人道之患卽犯陰陽之患而死者不畏死也吾奈何以死懼之凡學道者先須鍊已鑄劒劍成萬里誅妖一電光也若民果畏死而外道旁門是爲奇者吾得執無刃鋒芒劍而誅之然而不能殺其心也孰敢殺之哉此一劍也常有司殺者我心之天君是也自鍊而自殺其妄念則心死神活矣他人不能代我殺也如有代我殺者是代大匠斵無益於我而反傷於彼矣薛蕙曰朱太祖道德經序曰朕自卽位以來罔知前代哲王之道問道諸臣人執我見一日試覽羣書有道德經一卷見其文淺意奧久之見本經云民不畏死奈何以死懼之當是時天下初定民頑吏弊雖朝有十人棄市暮有百人仍爲之如此者豈不應經之所云朕乃罷極刑而囚役之不逾年而朕心減朕知斯經乃萬物之至根王者之上師臣民之極寶非但金丹之術也仁人之言其利溥哉老君之謂矣民不畏死起於饑寒故以民之饑次之貪損章第七十五民之饑人之不知道以其上食稅之多以其心之欲念不已是以饑所以不知道民之難治人不得道以其上之有爲以其心之事不停是以難治所以不得道民之輕死人之不合道以其求生之厚以其心之情不盡貪欲無厭是以輕死所以不合道不顧危亡夫惟無以生爲者勇於忘我不厚其生是賢於貴生所以得道不自生故長生李息齋曰上多取則下貧上有爲則下亂必然之理也我欲厚其生則不顧人之生我厚而彼薄安得不輕死聖人之於生蓋不得已彼視其生若無以生爲豈肯厚吾之生而奪人之生哉是之謂賢於貴生復圭子曰知道之民虛其心實其腹今上以食稅之多致民之饑則民心實而腹虛與我無欲而民自富者異矣得道之民弱其志强其骨今上以其有爲致民之難治則民志强而骨弱與我無爲而民自安者異矣有道之世民安其居樂其業而無夭傷今爲求生之厚而輕死是以形骸爲重性命爲輕與我好靜而民自正者異矣蓋以生養生反所以賊生善攝生者先要殺三尸斬六賊併世人厚生之事一切屏去所謂不求生而自長生其賢於貴生遠矣民之難治輕死因上傷和氣下多剛暴故以人之生也柔弱次之戒强章第七十六人之生也柔弱水結成冰一團和氣其死也堅强冰消卽水和氣㪚萬物草木之生也柔脆水流原在海和氣全其死也枯槁月落不離天和氣絶故堅强者死之徒死者生之本剛暴殺身之本柔弱者生之徒生者死之基柔和養生之根是以兵强則不勝心離則道愈險恃强則敗木强則共念頭不已心則愈雜木剛則折强大處下誰使之念起心離沉淪之本柔弱處上入道之基昇騰之象蘇子由曰沖氣在焉則體無堅强之病太和存焉則事無堅强之累兵以義勝者非强也强而不義其敗必速木自拱把以上必伐矣物之常理精者在上粗者在下其精必柔弱其粗必强大復圭子曰此章總見大道無能生有積柔爲堅積弱爲强柔弱者有之初也堅强者有之終也有還歸無人物生死皆借有形者以喻無形之道學人當先究人物生死柔弱强大上下之理方知以柔弱爲入道之基久之煉去堅强之重濁者盡化爲輕淸庶可以出有入無騰雲駕霧長生而不死矣嚴君平曰天地之理小不載大輕不載重故强人不得君王强木不得處上共音拱拄也拄音主荀子曰强自取拄兵强者則敗亡常爲弱小之所乘木强者則支拄常爲眾木之所壓此說爲是更得本文正意柔弱者謙之道也天道好謙故次之以天之道天道章第七十七天之道心之性性之神其猶張弓乎有力稱物平施高者抑之省思慮下者舉之奮精神損上益下有餘者損之絶嗜慾不足者與之養沖和裒多益少天之道心也損有餘而補不足生處使熟熟處使生虧盈益謙人之道則不然亦心也反是損不足以奉有餘貪其所愛忘其自然損人益己孰能以有餘奉天下要在忘我損己益人惟有道者忘心倣天是以聖人爲而不恃忘性損功成而不居忘神損其不欲見賢忘忘亦忘損之又損沈蛟門曰弓人調適弓幹使之和平則抑高舉下損有餘補不足天道平等虧盈益謙故曰天之道猶張弓也人之道則不然裒聚貧賤之財以益富厚取之盡錙銖而不遺用之如泥沙而不惜損不足以奉有餘與天道異矣誰能與天合道損有餘以奉不足其惟有道者乎是以聖人常出其身以任事雖爲而不恃其能雖成而不居其功此損之至也損己至故天下樂推而不厭雖不欲見賢不可得也謂我心本不欲見賢人自以我爲賢矣復圭子曰有一𡻕之天道有一月之天道有一日之天道修行人未明人道先須辨天道天道先要從一月日月盈虛消息上察起而後人身一陰一陽之升降可按也愚幸得遇眞人與聞大道甫悟太上天道其猶張弓之說人間之弓必損有餘以補不足易知也天上之弓月出庚掛於庚酉之方一陽居下其弓張於月之初三日乎月見丁掛於丁未之方二陽居下其弓張於月之初八乎月盈甲掛於甲卯之方三陽象乾其弓引滿掛於十五之日皆爲上弦之弓滿則謂之有餘有餘則當損十八月掛於辛戌之方損一陽而初下一弦矣二十三日月掛於丙午之方又損二陽而弦下一半矣二十八月掛於乙辰之方微陽將盡以象坤卦其弓已弛而不張自望以至晦皆所以損此月之有餘以補來月之不足修鍊者能月月行持進陽火退陰符如天道之補損周而復始此之謂性命雙修何憂不仙乎何爲人道不然一身之中所不足者陽也有餘者陰也反以情識損元陽而長羣陰孰肯損陰之有餘以奉不足之陽哉惟有道之聖人始而效天道之張弓有作有爲而不恃其勞旣而功成無作無爲而不居其功所謂行賢而去自賢之行聖人殆一天道也李息齋曰裒多以益寡者天之道也裒寡以益多者人之道也惟聖人能以己有餘而奉人不足故其能及萬物而不恃其能功蓋天下而不居其功利澤施於天下而不欲見其賢唯有道者而後如此不欲見賢謙柔之德也故以水德次之任信章第七十八天下柔弱莫過於水人之生也人之心也而攻堅强者欲不死者莫之能勝心無生死棒打不開其無以易之情念死矣無物可比故柔勝剛心有力則情念自消屈己者勝弱勝强心無爲則天道乃見軟能蝕堅天下莫不知人人有此理莫能行人人昧此理是以聖人言聖人知之受國之垢藏心於心而不見也海納百川是爲社稷主受國之不祥藏神於神而不露也處眾人之所惡是爲天下王正言若反蒼天中更添𡨚苦與物相反與道相合河上公曰今夫水置之圓中則圓置之方中則方止之則止決之則行然而大者能懷山襄陵高陵爲池深谷爲邱者皆是物也其細則磨鐵碾玉皆以水資是攻堅固者無以易之不可輕易也水能滅火弱勝强也齒先舌敝柔勝剛也天下莫不知柔弱長久剛强易折也莫能行恥謙卑好强梁也受國之垢是謂社稷主若江海不逆小流則能長保其社稷爲一國主也受國之不祥是爲天下王君能引過自任代民受不祥之殃則可以有天下而王也正言若反者正言合道而反俗俗以受垢爲辱受不祥爲殃故也復圭子曰上善若水五行以水爲本水能沉金漂木尅火蕩土此天地之水也其攻堅强信莫能勝也若人身之水腎也腎水足則五臓皆不受侵腎水竭則心火熾尅肺金金尅肝木木尅脾土死矣故大修行人寶此腎水如寶金河車轉運晝夜不敢暫留停所謂因燒丹藥火炎下故使黃河水逆流水能上行則火自下降是柔勝剛弱勝强也人人皆能知人人不能行何也好堅强之故也而聖人不然甯爲柔弱毋爲堅强未得道時忍辱含污如王在石中何垢如之甘魔受難如金遭火試何不祥如之旣得道後忽然眞人出見小則不失本來之面目是謂社稷主也嬰兒積漸變化大則分爲億萬之陽神是謂天下王也垢與不祥眾人之所惡是以正爲反惟有道者能直受之而不以爲反也水之受垢眾惡皆和故次之以和大怨任契章第七十九和大怨嗜慾殺身必有餘怨情念不斷安可以爲善何以見是以聖人執左契正念見前誠信及物而不責於人不爲物移不與物競一味克已故有德司契以心契心以道契道性靜情逸無德司徹自非寂然何能混融心動神疲天道無親靈光獨耀逈脫塵根常與善人無得無失惟道是從復圭子曰怨可和也必君父之仇方爲大怨不當和而亦和之怨雖解而心尙存不善者吾亦善之乃所以爲德善和大怨而不免有餘怨安可以爲善哉不如責已恩怨兩忘契符合也喻至誠之能使人符信也聖人執左契於已而不責人之報我有德於人可忘也人有怨於我不可不忘也至誠而不動者有之矣然盡其誠而司契於己非有德者不能若無德則司徹徹明也怨德大明不以厚道自居也豈知天道無親常與善人善人卽執左契而不責於人之人也吳㓜淸曰執左契不責於人無心待物也契者刻木爲劵中分之各執其一而合之以表信取財物於人曰責契有左右左契在主財物者之所右契以付來取財物之人王元澤曰史記云操右契以責事禮記云獻田宅者操右契則知左契爲受責者之所執徵謂執左契者已不責於人待人來責於已有持右契來合者卽與之無心計較其人之善否和怨者有心於爲善人也不若無心待物如執左契而不責於人靜中觀物而任其自然也有德無心待物無德有心待物徹通也古者助法周改助爲徹法恐八家私田所收之不均故八家私田亦令通力合作而均收之八家所得均平而無多寡之異司左契者任人來取無心計較其人故曰有德司徹法者患其不均有心計較故曰無德和大怨者恐善人受害有心爲之亦如司徹者有心於爲力弱之家恐其所得者寡耳執左契謂以道感民則自然契合無爭奪也故次之以小國寡民言知足而不貪也獨立章第八十小國寡民大圓鏡中使有什百可養者也人之器而不用其國太平使民重死一念不生而不遠徙念茲在茲雖有舟車無去無來無所乘之實無去來雖有甲兵無所陳之不爭善勝六根淸靜使民復結繩而用之這是道之源反朴甘其食味道之腴美其服受道之庇安其居處道之安樂其俗樂道之和隣國相望心心相照對境無心雞犬之聲相聞照見五藴皆空外境不入内境不出民至老死灰心絕念終身在道不相往來如如自然忘其彼此復圭子曰人身首戴大圓大國也心君獨處一腔小國也止有君而寡民何也一身之中惟神氣精而已神卽心也内有精氣外有耳目口鼻手足肢體屏而不用卽使有什百人所造之巧器安足以役吾神哉眞君高拱淸靜澹然寂寞無爲之上故能役使百體從令護衞眞君於方寸之中氣不耗精不漏耳目口鼻手足不妄馳所謂重死而不遠徙也夫有之舟車其駕馭猶有限也無形之舟車瞬息千里萬里而莫知操縱金刃之甲兵其揮霍猶易折也無刃之戈矛生於一掬倐忽誅夷兼併而莫能禁遏今眞君旣住無生國裏雖有舟車能引人往來而實不往不來無所乘之也眞君好靜無爲雖有甲兵以斬邪魔而實無邪無魔無所陳之也所謂心生種種法生心滅種種法滅惟神遊上古作葛天無懷之民復結繩之風所食者無味之味何其甘也所服者無色之服何其美也所居者空中之樓閣何其安也所同者太和之俗何其樂也玄同子曰所比隣者徹上下周傍之國無不心心相照而無所往也所狎聞者雞鳴犬吠之聲無不耳耳相通而不滯於聞也蓋吾眞君五藴皆空六根淸靜形如槁木心若死灰卽至老死而其玄玄眞湛之性如如自然之體已超乎靡麗繁華之外久矣安見其往來哉大哉眞人無聲無臭至矣以上八十章皆至道至言非徒悅視悅聽故次之以信言不美美言不信顯質章第八十一信言不美良藥苦口美言不信不得動着口頭三昧善者不辨無分別相辯者不善父母所生口終不爲汝說妄生差別知者不博頭頭總是博者不知只在目前物物有碍聖人不積不增不减旣以爲人賊來便打己愈有用之不盡旣以與人與物相接客來須省己愈多普濟無窮天之道生生不已利而不害時淸道泰無所不利聖人之道爲而不爭一人有慶兆民頼之則天之行慈仁儉約吕知常曰信實之言淡乎無味其猶水也淡而能久美好之言甘而悅人其猶醴也酌而易竭故曰信言不美美言不信善於心者尙行而不尙口守樸素也山有玉掘其山水有珠濁其淵巧言易於招尤取愆故曰善者不辯辯者不善知道者明於理而達於根得其一何必博乎博者通於物務於事所謂多則惑也故曰知者不博博者不知聖人積德不積財有德以教愚有財以及貧也莊子曰天道運而無所積故萬物成帝道運而無所積故海内服聖人演道德以爲人人受其益而德愈彰如鑒之照而不疲分浮贏以與貧貧受其賜而財愈有若井之汲而不竭故曰聖人不積旣以爲人已愈有旣已與人己愈多天地之大德曰生故曰利而不害聖人之守位曰仁故曰爲而不爭復圭子曰此章結局以天道聖道並言分明太上以天道自處纍纍五千言可不謂美乎不辯乎不博乎不爲人乎不與人乎然人當察其孰爲逆耳孰爲悅心在信不信則美不美分矣察其孰爲守中孰爲尙口在辯不辯則善不善分矣察其孰爲抱一孰爲馳騁在博不博則知不知分矣凡人有一長必積而私之聖人有道公之於人是不積也然此道人人本有聖人特爲一指點耳而未嘗分我之所有也故曰旣已爲人已愈有此道個個圓滿聖人特成人之美耳而其實不損我之故物也故曰旣已與人已愈多亦有天道運而不積之意夫天道好生卽有時而殺之而不害其生生之心故曰利而不害聖道不外慈儉不敢爲天下先之三寶卽有知雄守雌知白守黑不敢爲主而爲客之諸說皆是信言眞美不美眞辯不辯眞博不博未嘗積大道而私之於一己其五千言皆以爲人也與人也而太上之道何曾見其减乎迄今與天並高百姓䝉其利而無害道邁千古爲三教祖百王師誰敢與之爭道而馳乎學人有能得其旨趣之一二上則爲聖爲仙爲佛次亦可以超凡解脫而不作塵埃中人矣况有苦志潛心太上之道又不惜資財不憚艱辛以求之者乎他日必遇龍華會上人同飲刀圭羽翰自生而爲大丈夫功成名遂之日也有志之士當念茲在茲而不頃刻忘矣淸菴李祖曰信言不美忠言逆耳也美言不信巧言令色也眞實之言淡薄虛妄之言華飾善爲道者無分別故不辯善辯者致爭之由故曰不善眞知者光而不耀故曰不博廣博者明見於外故曰不知聖人損其所有愛養萬物而不爲主故曰不積養其無象象故常存守其無體體故全眞視之不足見聽之不足聞用之不可旣故曰爲人愈有與人愈多天地大德曰生故曰利而無害聖人守位曰仁故曰爲而不爭只這末後一章總發八十章之藴也經云可道非常道可名非常名不言之教無爲之益希言自然淡乎無味進道若退明道若昧廣德若不足太白若辱曰希曰夷惟恍惟忽大音希聲大器晚成正言若反已上等語雖不美聽其中有信故曰信言不美可道可名可見可聞持而盈之揣而銳之金玉滿堂善之爲善美之爲美樂之與餌聲味俱美以上等語雖美於聽終不實也故曰美言不信若訥若拙若愚若樸若屈若昬不尙已賢不貴奇貨儼兮若客敦兮若樸曠兮若谷渾兮若濁知白守黑知榮守辱不自見不自是不自矜不自伐以上皆不辯之善也尙奇務貨自高自大自見自是自矜自伐勇於敢嗜於欲不畏威不畏死不知足不知止强知前識昭昭察察以上皆不善之辯也不出戸知天下不窺牖見天道塞其兌閉其門挫其銳解其紛和其光同其塵不言而信不見而名無爲而成以上皆知者不博之謂也知物知人知内知外無狹其所居無厭其所生開其兌濟其事舍儉且廣舍後且先不知爲知皆是妄知以上皆博者不知之義也爲而不恃長而不宰功成不居絕聖棄知絕仁棄義絶巧棄利少私寡欲見素抱樸損之又損以至無爲去甚去奢去泰無知無事無欲以上皆不積之義也至於曲全枉直窪盈敝新萬物歸之萬民化之天地合之廣施博濟不窮不敝不殆不危用之不可旣此爲人愈有與人愈多之義也天之道生成運化利物平施生之畜之長之育之亭之毒之養之復之無所不利至公無私惟德是輔不言善應不召自來高者抑之下者舉之有餘者損之不足者與之一切有情無不覆幬此利而無害也聖人之道守雌抱一處柔行謙和光同塵後己先人同於道同於德同於天方而不割直而不肆光而不耀不責於人善貸且成善者善之不善者亦善之小國寡民自以爲足使民返樸忘其彼此民至老死不相往來皆不爭之義也只這不爭二字八十章之要也若是信得及的把這不爭二字爲日用久久純熟則自然造至混元之境眞常之道至是盡矣象帝之先妙明本體得矣且道不爭二字作麽會咦放倒門前名利竿着
