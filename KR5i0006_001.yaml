front:
  text: 太上道德寶章翼重刋道藏輯要太上道德寶章翼卷上
  hash: sha256:17274ba72d1ef95c5f7331ecdd102df4e0b099238cc6252bb5cf679a7d8c819a
  markers:
  - {type: page-break, offset: 7, content: '', id: CK-KZ_KR5i0006_01p001a}
body:
  text: 白玉蟾真人章句復圭子程以寧闡疏道李淸菴曰道之可以道者非真常之道也夫真常之道始於無始名於無名擬議即乖開口即錯設若可道道是甚麼既不可道何以見道可道又不是不可道又不是何如即是若向這裡下得一轉語參學事畢矣其或未然須索向二六時中興居服食處回頭轉腦處較勘這個巍巍的活潑潑的不與諸緣作對應是個甚麼校勘來校勘去校勘到校勘不得處忽然摸著鼻孔通身汗下方知道這個原是自家有的厯百劫以來不曾變易所謂道也者不可須臾離也又道行住坐臥不離這個况覆載之間頭頭物物都是這個亘古亘今只是這個生天生地只是這個至於日用平常動靜作息只是這個一切有形皆有敗壞惟有這個常在天地虛空亦有敗壞只有這個不壞只這個雖鐵眼銅睛覷不破為甚覷不破只傷他不曾覿面相逢縱饒覿面相逢也是蹉過且道蹉向甚麼處去不得亂走畢竟作麼會淸菴向這裡分明舉似只是欠人承當倘遇知音剔起眉毛薦取咄昨夜江頭新兩過今朝依舊遠山看德德之一字亦是強名不可得而形容不可得而執持凡有施設積功纍行便是不德也只恁麼不修習不用功死如稿木待德之自來終身無德也這個德字愈求愈遠愈執愈失經云上德不德是以有德又云上德無為而無以為只這兩句多少分明只是欠承當若是個信得及的便把從前學解見知聲聞緣覺一切掀倒向平常踐履處把個損字來受用損之又損損來損去損到損不得處自然玄德昭著方信無為之有益經云不言之教無為之益天下希及之又云玄德深矣遠矣會麼不離當處常自然覔到知君不可見經經之一字亦是強名聖人為見世人隨情逐幻嗜欲迷真中心業識之擾攘靈地無明之熾盛是以天真喪失橫夭傷殘不能復其本元於是用方便力開善誘門接引羣迷使歸正道故著書設教強名曰經經者徑也衆所通行之大路也雖然讀是經者却不可泥在語言三昧上亦不可離了此經向外尋求須是向自已分上著意把這五千遺言細細咀嚼點點畫畫不要放過忽然嚼得一句半句透這一部經都在自已方信道開口不在舌頭端到這裡打開自己寶藏把出自已經來橫拈倒用不惟這一部經至於三十六部尊經一大藏教典從頭徹尾轉一遍只消一喝都竟還委悉也麼平地起風波靑天轟霹𩆝諦聽諦聽體道章第一道如此而已可道非常道可説即不如此名強名曰道可名非常名謂之道已非也無即此是道名天地之始道生一是天地之始有一生二二生三三生萬物故有名萬物之母一無生萬有萬有歸一無生生不息故常無虛心無念欲以觀其妙見物知道知道見心無心則自然運化常有守中抱一欲以觀其徼徼音竅身有生死心無生死此兩者萬有一無一無亦無無中不無同出而異名萬法歸一一心本空同謂之玄道非欲虛虛自歸之人能虛心道自歸之玄之又玄虛裏藏真無中生有衆妙之門悟由此入用之無窮百千萬法皆從此出復圭子曰此章總言道之體用及入道工夫也老君之學全在於此其五千餘言所敷演者惟演此一章已耳儒之所謂道者路也以日用常行言老之所謂道者直指本體言玄同子曰第一道字大道也第二道字即大道非口道之道分別在一可字凡人驟觀第二道字謂口道之道既有可口道之道則必有不可口道之道矣是可道與不可道二也既為大道豈容口道稍涉擬議便非尋常日用常久不壞之道復圭子曰道之一字且不可強加况又可強名之乎名以名此道也而不知道無以名為也造化密移四時默默中行百物默默中生必欲歸名於道豈萬古不易之常名乎無能生有故無為天地之始者道也道生天地長於上古而不為老無極是也有彰乎無故有為萬物之母者一生二二生三三生萬物萬物統體一太極是也以上數句皆指造化之渾淪大道而言故常無欲以下則近指人身道妙而言令人知修道也於二觀字可見故常無二字作一句欲以觀其妙太上謂我尋常日用安心於無要以觀其道之妙處常有二字作一句欲以觀其徼徼即妙中之孔竅也太上謂我尋常日用安心於有要以觀其道之竅處竅生於妙有欲生於無欲此兩者於不見中親見於親見中不見其出同特其為名異耳既名為妙又名為竅則雖有欲而實未嘗有欲故同謂之玄凡遠而無所至極者其色玄故以名道玄不足以盡之不但絶有無之名抑且離玄妙之迹故曰玄之又玄生仙生佛在是生天生地在是生人生萬物亦在是豈非衆妙之門乎此一章已盡全部道德之旨又曰有無名而後有有名凡名不永者有名為祟故也常者久而不變之謂渾而無奇之稱既曰常又曰玄所以益明常之不可易不可加也聖人特常之至者耳程俱論曰可道之道以之制行可名之名以之立言至於不可道之常道不可名之常名則聖人未嘗敢以示人非藏於密而不以示人也不可得而示人焉耳故西方聖人其所示現設為乘者三演為分者十二命之曰教若夫傳於教外者則其不可道與不可名者也中國之聖人祖唐虞憲文武以訂詩書禮樂之文命之曰經若夫其所以言猶履之非迹者則其不可道與不可名者也故老君著五千之文將以示天下迪後世非退於道冥而獨於已者故其發言之首以謂可道之道可名之名者五千文之所具也若夫千聖之所不傳者不可得而言也筆乘謂太上實非舍有以求無苟舍有以求無則是有外更有無安得為無蓋當其有時實未嘗有乃真無也故不滅色以為空空即色不捐事以為空事即空不然其所謂無者為對有之無而所謂有者為對無之有亦惡得謂之常無常有哉噫安得知常者而與之一論此李淸菴曰豫謂無欲者無心作為自然也有欲者有心運用工夫也無為則能見無名之妙全其性也有為則能見有名之徼全其命也有與無性與命同出而異名同謂之玄玄之又玄有無交入性命雙全也子思曰喜怒哀樂之未發謂之中中也者天下之大本也即無欲觀妙之義也發而皆中節謂之和和也者天下之達道也即有欲觀徼之義也致中和天地位萬物育即玄之又玄之義也所謂欲者欲人之不可之謂可道必名名必有知故次之以天下皆知養生章第二天下皆知美之為求為美名美斯惡已不得美名不美是惡之因皆知善之為求為善人善斯不善已反為惡人善是不善之因故有無相生無必生有有必生無難易相成先難後易先易後難長短相形道本無形自相長短高下相傾天旋地轉本無高卑聲音相和一風所鳴萬籟相應前後相隨往古即今來今即古是以聖人處無為之事貴乎自然行不言之教道寓於物萬物作而不辭無必生有安得不生倘若不生安見長存忘物生而不有無非幻妄忘形為而不恃今日今日而已忘情功成而不居豈可以夢為實忘成夫惟不居忘外而不忘其內也是以不去一我自存復圭子曰大道無名原無美惡亦無善不善自混沌鑿而美惡分因有善不善蓋至美不美至善不善美中藏惡善中寓不善非天下所得而知也故人之所謂美且善者豈真美且善哉天下之物生於有有生於無是之謂有無相生合抱之木起於毫芒百尺之臺潰於蟻穴是之謂難易相成人知臨短以為長不知即短以為長是尺有所短寸有所長非長短相形乎高者不可使卑卑者不可使高一定之高下也若天道高而下降地道卑而上升非高下相傾乎空谷傳聲聲應氣求一淸一濁遞為抑揚則聲音相和也古以今為後而隨前來亦以今為前而隨後往則前後相隨也已上相生相成相形相傾相和相隨六者皆自有為而致也惟聖人洞知其故已雕已琢復歸於朴處無為之事以道而治也行不言之教以身而教也是以萬物並作吾從而與之作作而不辭忘物也萬物並生生而不有忘形也如造化雖能有所作為而不自恃其能忘情也如四時雖有成物之功而不自居忘成也夫惟不居其功是以生成之功歸天地參贊之功歸聖人天地也聖人也一也功豈去天地聖人哉碧虛子曰美善生於妄情以情之所好為美情之所惡為惡縱已妄情非惡而何以已之所是為善以已之所非為不善縱已是非安有美乎莊子曰是非吾所謂情也吾所謂無情者言人不以好惡內傷其身常因自然而不益生也此謂止於實當也夫聖人豈無美善蓋美而不矜同於無也不矜則德全同無則害遠德全害遠美善盡矣若以美善化天下使知其美之為美蓋未盡善也知則善惡互生難易對陳勢必爭尚賢德故次之以不尚賢安民章第三不尚賢為子當孝為臣當忠使民不爭飽不思食忘我不貴難得之貨黃金與土同價使民不為盜如意無他不見可欲耳目之間心實在焉使心不亂去即喚回忘情是以聖人之治多少分明虛其心是實其腹弱其志強其骨河上公云愛精重施髓滿骨堅常使民無知無欲使夫知者不敢為也多少分明識訣者恐懼為無為則無不治是復圭子曰尚賢好名也名爭端也若上不好賢則民自然不爭貴難得之貨好利也若上不好利則民自然不盜伯夷死名於首陽爭名也盜跖死利於東陵爭利也豈非上之人所尚在名所貴在貨哉苟上者不見名利有可欲則民亦各安其志而心不亂矣非閉目而不見也謂天下無可欲者動其中耳是以聖人之治以下虛心實腹弱志強骨八個字分明是指點金丹大道教人下手處蓋人之不能入道者緣心上不淨一團名利牽扯心不虛也方寸幾何莫非嗜欲所填塞則元精元氣元神不存為一空殼而腹不實矣虛心二字談何容易心必如太空任浮雲之往來而太虛之體自若如是則元精元氣元神固而腹始實矣心猶體也所以宅神君氣統精而志則心之發竅處也志強則心未免外馳骨力必受其損故弱其志而後能強其骨所謂上善若水水善利萬物而不爭天下之柔弱莫過於水而攻堅強者莫之能勝棖也欲焉得剛則骨弱矣嘗使民無知無欲是復歸於混沌也使夫知者不敢為也不敢鑿其混沌矣為者始於有作人難見也無為者及至無為衆始知也則無不治者大修行人以身為國以精不動搖謂之民安神氣充裕謂之國富而國胡不治之有蘇注尚賢則民恥於不若而至於爭貴難得之貨則民病於無有而至於盜見可欲則民患於不得而至於亂雖然天下知三者之為患而欲舉而廢之則惑矣聖人不然未嘗遺於野而不用賢也獨不尚賢耳未嘗委之地而棄其貨也獨不貴之耳未嘗去所欲而稿木死灰也獨內不存諸心外不遺其迹而已矣呂注是以聖人之治也虛其心實其腹弱其志強其骨心藏神而腹者心之宅虛其心則神不虧而腹實矣腎藏志而骨者腎之餘弱其志則精不搖而骨強矣虛其心而腹實則嘗使民無知也弱其志而骨強則嘗使民無欲也智者知賢非上之所尚而貨非上之所貴則為之非所利故不敢為也夫唯如此則為無為而無不治矣尚賢尚貴則爭欲之心起矣惟聖人治之以虛故次之以道沖而用之無源章第四道沖而用之太虛同體或不盈虛中淵乎似萬物之宗心也挫其鋭斂神不露鋒芒解其紛止念和其光藏心於心而不見同其塵混心於物湛兮似若存存神於無吾不知誰之子象帝之先惟道為身釋德淸曰此讚道體用微妙而不可測也沖虛也盈充滿也淵靜深不動也宗依歸也謂道體至虛其實充滿天地萬物但無形而不可見故曰用之或不盈謂道體淵深寂寞其實能發育萬物而為萬物所依歸但生而不有為而不宰故曰似萬物之宗沈蛟門曰鋭則有觸紛則多端光則有分別塵則渾然無迹大道摧挫芒鋭而無圭角解釋紛結而無繫纍和戢光耀而無英華惟混世同俗並居雜處而不自表潔湛然澄徹非存非非存泰定之中天光自燭真一之妙洞在目前其沖虛如此吾不知誰之子而能臻此化境其亦象先天一氣統帝之元耳復歸於朴復圭子曰挫鋭解紛和光同塵皆是太上生平受用妙處他日點化楊朱曰而睢睢而盱盱而誰與居太白若辱盛德若不足亦是挫鋭解紛和光同塵之意學者知此體認工夫則處處有著落而入道不難矣沖虛淵靜為萬物所宗尋其宗先乎天地故次之以天地虛用章第五天地不仁無心以萬物為芻狗任其自然聖人不仁以天地之心為心也以百姓為芻狗尚自忘我豈有他哉天地之間心也其猶槖籥乎運而不息虛而不屈用之無窮動而愈出純亦不已多言數窮如何説得不如守中盡其在我王純甫曰多言數窮不如守中是太上自危自戒之言也蓋道本不可言而斥之以不仁道本不可名而狀之以槖籥知者固得意而忘言矣不知者不覩其真而徒為嘵嘵也則吾説窮矣中也者中也虛也無也不可言不可名者也守此而心思路絶言語道斷其何窮之足慮太上著書談道而其言若此則其不得已之心為何如也後世學者果不得於芻狗百姓之言而遂疑其有土芥斯民之意且曰申韓慘刻原於道德也自史遷已然况其他乎此即多言數窮之一驗也太上蓋預知之矣復圭子曰猶似也槖即皮鞲乃鼓風鑄物之器籥即管籥乃承氣出音之器用之則伸不用則虛以自處置之而不以為屈故曰虛而不屈若用之則觸動其機而風生愈出愈有故曰動而愈出蓋道原自虛中來豈涉言詮渾然無迹豈落象數故多言數窮即書不盡言言不盡意之謂也併芻狗槖籥之喻皆贅談不如守中者吾守中而歸於忘言斯包含無窮乃得之矣嚴君平曰芻草也謂朿芻為狗古人用以祭祀除祓不祥用已而棄之言當用之時不甚愛及乎棄之亦不為憎也天高而淸明地厚而順寧陰陽交通和氣流行泊然無為萬物自生焉天地非傾心移意巿恩施澤而有以為也此所謂天地不仁以萬物為芻狗明王聖主非竭智盡能顯仁示德而有以為也此所謂聖人不仁以百姓為芻狗也槖籥含虛而不屈者由其神也故次之以谷神成象章第六谷神不死此心本無生死是謂玄牝同此一天一陰一陽玄牝之門念頭動處一闔一闢是謂天地根惟心綿綿若存只是如此無休無歇用之不勤無為而已無物不成用不勞也故曰用之不勤白真人曰谷者天谷也神者一身之元氣天之谷含造化容虛空地之谷容萬物載山川人與天地同所稟也亦有谷焉其谷藏真一宅元神是以頭有九宮上應九天中間一宮謂之泥丸又曰黃庭曰崑崙曰天谷其名頗多乃元神所住之宮其空如谷而元神居之故謂之谷神神存則生神去則死日則接於物夜則接於夢神不能安久而自定性入自然無為妙用未嘗至於勤勞迫切故曰用之不勤即此而觀則玄牝為上下二源氣母升降之道明矣世人不窮其根源便以鼻為玄口為牝則玄牝之門又將何以名之孫真人曰腎之前臍之後大腸左小腸右玄牝之門是謂天地之根也玄關即是玄牝出入之門天地未判父母未生鴻蒙之初乃是先天真一之氣耳釋德淸曰牝物之雌者即所謂萬物之母也用即出入之樞機謂道為樞機萬物皆出於機皆入於機故曰玄牝之門是謂天地根沈蛟門謂生天生地皆由此出故謂之門謂之根非玄牝之外又有門門之外又有根也綿綿之義有三至柔也至微也至長也若存者不可謂之存不可謂之非存也至人無惰故無勤凡人有作必有輟愈勤則必有不勤者繼之天一日一周而未嘗勤行一度斯至人所謂用之不勤也薛蕙曰自古為玄牝之説者往往不本谷神而別為異説皆非老子之本旨也史記曰老子所貴道虛無因應變化於無為至哉言乎蓋即谷神之説也嘗為之説曰謂之谷則非有也謂之神則非無也又曰谷神之可見者特其因應焉耳雖曰可見而不可見者存焉是何也蓋可見者皆彼萬物之迹而非其本體也顯其因應之妙用藏其虛無之實體此谷神之所以為神也非通神明之德者孰能識之綿綿不絶得天地之根故次之以天長地久韜光章第七天長地久湛然無為天地所以能長且久者心亦如此無為以其不自生此心長存故能長生本無生滅是以聖人我也後其身而身先無乎不在外其身而身存今古如此非以其無私耶天地與我同根萬物與我同體故能成其私我即天地天地即我以其無我故能成我釋德淸曰此接上章用之不勤之義也言天地以不生故長生以比聖人忘身故身存也意謂何物長久惟天地長久然天地所以長久者以其不自私其生其次則聖人長久是以聖人體天地之德不自私其身以先人忘我也則人樂推而不厭故曰後其身而身先復圭子曰聖人有軀殼之法身有元神之真身聖人不養形而養神者以軀殼有壞這個不壞耳後身後此法身也而身先者則此真身透有無乘虛空而超乎萬有之上也外身外此法身也而身存者則此真身入水不溺入火不焚而與天地並存也衆人皆後而聖人獨先衆身皆亡而聖身獨存無乃似私乎不知聖人恥獨為聖人無私也而人盡自暴自棄不肯學聖人故覺聖人私其道於已而成其私耳其實何私之有薛蕙曰身先身存是成其私也原其所以致之顧由於後外其身而無私故曰非以其無私邪故能成其私夫聖人之無私初非有欲成其私之心也然而私以之成此自然之道耳如欲成其私即有私也未有有私而能成其私者也程俱曰天地人一原耳天之所以為天地之所以為地人之所以為人固同而天地之能長且久人獨不然何哉天不知其為天地不知其為地今一受其形而人則認以為已曰人耳人耳謂其養生不可以無物也則騁無益之求謂其有身不可以不愛也而營分表之事厚其生而生愈傷養其軀而身愈病其不為中道夭者亦幸矣老君之旨如此而未之思者以謂黃老之徒率畏死而求長生豈不惑哉夫人而無生道安所載然世之喪其生者蓋反以有其生為纍有其生者且尤老君之深戒而謂其外於道而求生未之思耳聖人後身外身柔順利物故次之以上善若水易性章第八上善若水性猶水也水善不為物所忤而已利萬物而不爭初何心哉隨方逐圓處衆人之所惡於我何有故幾於道心亦如此河上公曰水性與道同居善地無所擇也捨高就下心善淵有所養也與善仁無分彼此言善信真實應物正善治無往不正治穢濁而不染平高原而不勞事善能無為而無所不為隨方逐圓不與物逆動善時與時偕行夫惟不爭方寸不競不與人逆故人不爭故無尤亦不以為福也無尤則上善矣釋德淸曰此言柔順之德無往而不善也上最上謂謙處不爭之德最為上善譬如水也故曰上善若水水之妙在利萬物而不爭不爭謂隨方就圓無可不可惟處於下世人皆好高而惡下惟聖人能藏垢納汙處衆人之所惡幾近也無往不善故幾於道蘇子由曰易曰一陰一陽之謂道繼之者善也成之者性也又曰天以一生水蓋道運而為善猶氣運而生水也故曰上善若水二者皆自無而成形故其理同道無所不在無所不利而水亦然然而既已麗於形則於道有間矣故曰幾於道然而可名之善未有若此者也故曰上善避高趨下未嘗有所逆善地也空虛靜默深不可測善淵也利澤萬物施不求報善仁也圓必旋方必折塞必止決必流善信也洗滌羣穢平凖高下善治也遇物賦形而不留於一善能也冬凝春泮涸溢不失節善時也有善而不免於人非者以其爭也水惟不爭故兼七善而無尤道體虛無貴不盈而善持故次之以持而盈之運夷章第九持而盈之無欠無餘不如其已放下身心揣而鋭之貴欲無為不如長保謹而不失金玉滿堂儉視儉聽裕然有餘莫之能守終日如愚河上公云嗜欲傷人財多纍身富貴而驕潛心勿用自遺其咎寂然不動何咎之有一涉驕奢必致禍患功成名遂月到天心處風來水面時身退天之道退自有餘天地合德全是謙卑遜順之義復圭子曰此接上章上善若水之義持捧也盈滿也已止也不如弗持也揣揣摩也鋭思慮精鋭也不可長保即人之不可謀者天也知盈而持知鋭而揣已為不善况盈而不持鋭而不揣者乎金玉非世上黃金白玉乃吾身神氣精之三寶金液玉液是也曰滿堂猶滿身人人本具個個圓成仙佛盡人可作而莫之能守元神元氣元精琢喪殆盡所存者僅後天之神氣精耳知玉液金液還丹誰乎若富貴而驕止知堆金積玉而不知自喪本來之金玉勢必自遺其咎併世間之金玉亦莫能守矣四時之運得序者進成功者退日中則昃月盈則虧天猶不能常盈况於人乎故曰功成名遂身退天之道分明是指點富貴之人當退而修真訪道物色高人推究天道白真人曰有人要識長生訣只是搜尋造化根古者虛無生自然自然生大道大道生一氣一氣分陰陽陰陽為天地天地生萬物則是造化之根也謂富貴之人最難省悟故有此一段議論劉師玄曰盈則必虛戒之在滿鋭則必鈍戒之在進金玉必纍戒之在貪富貴易淫戒之在傲功成名遂必危在乎知止而不失其正此言深欲救人謂非必處山林絶人事然後可以入道雖居功名富貴之域皆可勤而行之外物盈滿鋭心富貴不若抱一無咎故次之以載營魄抱一能無章第十載營魄安心抱一能無離甚處去來專氣致柔純淸絶點二物渾成如母㩦嬰能嬰兒混然一片純一不雜得返朴還淳滌除玄覽無事於心無心於事塵淨鑑明能無疵身心如一愛民治國怡神養氣能無為無念無為無思無慮不動不搖道泰時淸天門開闔心地開明能無雌一而不二出入有無不矜不伐明白四達一理燭物能無知終日如愚黜聰屏智和光同塵生之畜之一心所存包含萬象斡旋四德長養羣情生而不有心同太虛為而不恃智周萬物忘其所自長而不宰泰然無我是謂玄德姬真人云為而無為應事無迹謂之深玄之德復圭子曰此章太上明明發泄金丹大道世儒不讀丹書未聞祕訣而欲以吾儒經史諸子百家解道德經是以凡見而窺仙俗骨而測佛地下人而談天上事此必不得之數豫請以所得道家之膚見而泄其一二可乎載如車之載物也營營衛也載營魄軀殼載之也此凡人之所同至抱一能與營魄而不離則神人之所獨呂祖云精神氣血歸三要南北東西共一家一即丹也抱一則精化為氣氣化為神神化為虛矣此不二法門長生久視之道然必自調息始見鼻中氣出入如煙煙象微消成白久之而息微是專氣致柔也先天祖氣惟嬰兒完全學人養氣能從後天以復先天如嬰兒乎此是鍊精化氣工夫玄覽即同謂之玄玄字也大道既不可名又豈可覽乎玄覽者見解也稍著見解即為大道之疵纇矣故必滌除玄覽渾然粹白能無疵乎此為鍊氣還神工夫身為國心為君精為民愛民者愛此精氣也精氣不虧分毫已滿一升六合之數乃得藥之時有作有為之事後來工夫純熟民不期安而自安國不求治而自治能無為乎及至無為衆始知也此為鍊神返虛工夫天門即泥丸宮也神人之所棲又謂之天谷至於天門開闔能無雌乎則純陽而無陰矣然自然有一點如霧如電之陽入玄門透長谷而竟上泥丸有開無闔不是道有闔無開亦不是道霎時霹𩆝一聲忽爾天門頂破真人出見大神通如是則四大虛空皆我光明所燭而已不有其知斂神韜光復歸於虛空非能無知乎此為鍊神合道工夫生之畜之者天地也天地有生成而不有之以自私天地有作為而不恃之以為能宰者總也天地有長養而不宰之以自居天地之玄一聖人之玄也玄德即玄門為聖為賢者此玄也成仙作佛者此玄也是之為玄德天地與聖人同此玄同此德也朱子曰專氣致柔看他這個是甚麼樣工夫專是專一無間斷致柔是到柔之極處才有一毫發露便是剛這氣便粗了愚謂朱子之説甚善老子之學天下莫能行者此其一也有專氣致柔之和則物歸如輻之輳轂故次之以三十輻共一轂無用章第十一三十輻如三十日是也共一轂一月是爾當其無月大月小有車之用雖是月小亦成一月轂空車得行心空神得止埏埴以為器陰陽往來而成造化當其無天地無全功聖人無全能有器之用問有不及亦見天工器空諸物受心空道眼開鑿戶牖以為室萬象森羅同乎一天當其無神不守舍五官失衛有室之用聖愚同性忘內逐外故有之以為利得此父母之身為用無之以為用存吾厥初同然之理無內無外釋德淸曰此言世人但知有用之用而不知無用之用也意謂人人皆知車轂有用而不知用在轂中一竅人人皆知器之有用而不知用在器中之虛人人皆知室之有用而不知用在室中空處以此為喻譬如天地有形也人皆知天地有用而不知用在虛靈無相之心是知有雖有用而實用在無也然無不能自用須賴有以濟之故曰有之以為利無之以為用利猶濟也老君之學要即有以觀無若即有以觀無則雖有而不有是謂道妙此其宗也沈蛟門曰車也器也室也皆有也天下所賴以濟者也故曰有之以為利車之受軸器之受物室之受明皆無也三者所賴以濟者也故曰無之以為用按古者一車三十輻法一月數也共一轂者轂中有孔衆輻共湊之埏和也和土以為器無轂中受軸處器中之虛處戶牖之空處其有之以為利人皆知之而無之以為用非老君不能發其妙也一部莊子多言無用之用上章發明虛用虛其用則不為色聲諸根所惑故次之以五色五音檢欲章第十二五色靑黃赤白黑令人目盲其機在目志之所之眼被色瞞五音宮商角徵羽令人耳聾貪外喪內耳被聲誘五味甘辛酸鹹苦令人口爽忘其自然口被味瞞馳騁田獵心猿意馬令心發狂不定身心無所歸著心為境移難得之貨金玉何用令人行妨所寶惟心惟心守一意為物轉是以聖人為腹其樂也內內境不出不為目耳隨聲走眼被色迷收視返聽故去彼取此見色明心聞聲悟道釋德淸曰此言物欲之害教人袪欲之行也意謂人心本自虛明而外之聲色飮食貨利本無可欲人以為可欲而貪之眼淫於色而失無色之色故盲耳淫於聲而失無聲之聲故聾舌淫於味而失無味之味故爽心則流逸奔境而失其正定故發狂行則貪逐貨利而失其正操故有妨惟聖人知量知足為腹者實其腹也守五性去六情節志氣養神明不為目者舉一以包四也羅綺千箱不過一暖食前方丈不過一飽其餘皆榮觀而已故聖人為腹不為目去外面之紛華取在內之真實為腹不為目忘我之事故次之以寵辱若驚厭恥章第十三寵辱若驚無榮無辱此心泰泰然寵是辱先貴大患若身思患預防身為患本貴重也何謂寵辱貴賤貧富寵為下人之所惡得之若驚苟非吾之所有居安慮危失之若驚雖一毫而莫取是謂寵辱若驚於我何有何謂貴大患若身安危纍吾心得喪纍吾性吾所以有大患者心之不寧身之不安為吾有身有我則有身無我則無身及吾無身湛然一天我亦非我吾有何患忘我忘世天真自然故貴以身為天下心猶君也身猶天下則可以寄天下百年如過客萬物如逆旅愛以身為天下能治其身亦猶治國乃可以託天下可以久而不失復圭子曰此上下文雖議論疊疊而所重不過及吾無身一句看得破則上下文如劈竹矣古之達人驚寵若驚辱知寵之為辱先也貴重也貴身如貴大患知身之為患本也何謂寵辱若驚蓋為人上者寵人為人下者寵於人寵雖與辱對辱無得失而寵有得失故寵為下苟一旦得失驟至未有不驚駭者何謂大患若身人生大患有二非人道之患即陰陽之患遭此患者則此身為之纍也及吾無身非無真身也解脫此肉身則二患不能入即白真人所謂天地雖大能役有形不能役無形陰陽雖妙能合有氣不能合無氣是無身乃超世之事為一已不為天下也若經世者亦必先有已而後有天下彼不貴重其身而為塵勞所役則自治且不暇安能寄天下不愛惜其身而敝精殫神則保身且未遑安能保天下此所以貴以身為天下貴以其淸虛恬淡之身愛以身為天下愛以其富貴不與之身寵而不有其寵貴而不有其貴如舜禹之有天下而不與焉乃真可以寄託天下者也陸希聲曰若以得失動其心物我存乎懷則寵辱不暫寧吉凶未嘗息安足為天下之正居域中之大乎惟能貴用其身以為天下愛用其身以為天下者則是貴愛天下非貴愛其身也夫如是則得失不在已憂患不在身乃可以大位寄託之此大道之行公天下之心也張洪陽曰寵辱若驚是忘名的事貴大患若身是忘形的事忘名而心不驚忘形而身不纍至矣非順道無形者不能無寵辱故次之以視之不見贊玄章第十四視之不見名曰夷身中之心大象無形視不可見聽之不聞名曰希心中之性搏之不得名曰微性中之神此三者不可致詰不可以説説惟當以意會河上公云無色無聲無形口不能言書不能傳當受之以靜求之以神故渾而為一同歸於一而已矣其上不皎性無體莫見乎隱其下不昧神無方莫顯乎微繩繩兮不可名綿古亘今昭然獨存非一色也不可以五色分非一聲也不可以五音辨非一形也不可以長短大小度復歸於無物見物便見心藏身處沒蹤迹是謂無狀之狀心無形相道無形狀能與萬物作形狀無物之象性無形象一無物象而與萬物形象是謂忽恍神無去來親見中不見迎之不見其首其來非今隨之不見其後其去非古言無窮無極而長存執古之道本無圓成無為以御今之有本無生死無為之道總攝萬有能知古始古即今今即古聽其自古自今無為是謂道紀如是如是無為之道因無彰有復圭子曰至色無色其名曰夷著視不得至聲無聲其名曰希著聽不得至形無形其名曰微著執摶不得此三者口不能言又安可詰問一分為三三復合而為一所謂大道體虛超乎聲色名相思議之表天處上而明地處下而暗萬物處中而繩繩不絶惟此混然一者在上而不加明在下而不加暗在中繩繩生萬物而不可名終復歸於無物而不可知所謂藏萬物處沒蹤迹沒蹤迹處藏萬物無狀而天下之狀從此出不見中親見是謂無狀之狀無物而天下之象從此出親見中不見是謂無物之象總之視不見聽不聞摶不得若忽若恍其起無首其卒無尾本無圓成本無生死果能執古無為自然之道以御今世之有為聽其自古自今自今自古能知古始所出之自而不遷其德是謂道紀如是如是薛蕙曰古之道即無也觀其對今之有而言意可見矣曰古者非在今始有也今之有謂今天下之事古始即古之道人之應物不知本源之無物而惑於外物以自纍此世之通患也惟執古以御今者以無事為真宅以有事為應迹事雖萬變而在我之不變者常一也道紀者道之綱紀蓋天下之事其本在此故也昔司馬談曰道家使人精神專一動合無形贍足萬物立俗施事無所不宜指約而操易事少而功多劉向曰道家秉本執要淸虛以自守卑弱以自持此君人南面之術也二子之論可謂善矣惜乎其有所未備耳何者世俗之儒大抵謂老君棄人事之實獨任虛無而已斯言也衆皆以為信然而未知其大不然也老君曰執古之道以御今之有是蓋任虛無以應事曷嘗棄事而獨守其虛無哉然則老君之學非不應事也第其所以御之者在不悖其虛無之本耳觀老君之旨若此著明而古之善言老君者未嘗舉以為説以解世俗之惑豈非不備者哉夫學者之患在考其文而不通其意今老君之言較然若此而論之者乃如彼則於考文者固已疏矣况其深遠之意乎能知道紀便為善士故次之以古之善為士者顯德章第十五古之善為士者明心見性微妙圓通允執厥中深不可識吾道一以貫之不可得而聞也淸靜光明視不得見夫惟不可識惟精惟一故強為之容謂之道也皆無心焉豫兮若冬涉川得處徹骨猶兮若畏四鄰君子愼其獨儼兮其若客無不敬渙兮若氷之將釋心聞神悟敦兮其若朴終日不違如愚曠兮其若谷庶乎屢空臆則屢中空其中渾兮其若濁心與道冥不垢不淨是也孰能濁以止靜之徐淸澄之不淸撓之不濁孰能安以久動之徐生昔既不生今亦不滅保此道者道不假修但莫汙染不欲盈道無窮心無盡夫惟不盈有成亦有敗道本無成無敗沖虛故能敝潛龍勿用不新成喚作如如早是變了也復圭子曰今之為士者昭昭揭日月而行惟患人不知古之善為士者獨不然藏器韜光去粗而微微極而玄玄極則無所不通其精深也不可得而測吾於其不可測處而強為之形容豫兮若冬涉川猶兮若畏四鄰猶豫行不進貌冬涉川謂不敢遽進畏四鄰謂不敢妄動儼若客儼謂肅然可觀若客謂謙退不敢直前渙兮若氷將釋渙者解散釋者消亡謂氷泮易溺如恐陷也以上四語皆畏愼之至至人應世之象敦兮其若朴如木未雕無文飾也曠兮其若谷曠空也谷虛無不受也渾兮其若濁藏垢納汙和光同塵也此三語者皆混沌之意至人混世之象蘇子由曰中民之士以物汨性則濁而不復淸枯稿之士以定滅性則安而不復生今知濁之亂性也則止而靜之靜之而徐自淸矣知安之滅性也則久而動之動之而徐自生矣易曰寂然不動感而遂通天下之故今所謂動者亦若是耳盈生於極濁而不能淸安而不能生所以盈也不欲盈不使之盈也天下之物有新則有敝有敝則有壞而不敝者鮮矣夫惟不盈則新敝成壞無所容心是以亘古亘今能與天壤俱敝不見其舊而壞安見其新而成耶苟學道之士慕其新成則與道異矣非大成之道也故曰大成不缺其用不敝能與天壤共敝者沖虛之善士也故次之以致虛極歸根章第十六致虛極忘形守靜篤忘心萬物並作忘物忘我吾以觀其復回光返照見天地心夫物藝藝身外無為各復歸其根洞見本來靈光不昧歸根曰靜無生無滅返本靜曰復命我無生死我不能無生死我能生死我本無生死復命曰常常光見前如如不動知常曰明心死方得神活魄滅然後魂昌不知常道不可以須臾離也妄作凶一念所形無非幻妄得道則吉失道則凶悟道則仙迷道則鬼知常容其大無外大無不包容乃公其小無內公正無私邪魔自退公乃王能為萬物主不逐四時凋王乃天本有之天理無不通天乃道一氣之始萬象之祖曷有終窮道乃久道即心心即道無盡沒身不殆心無生死道無往來天地雖變這個不壞復圭子曰虛靜者乃道之本體得道之人捐情去欲五內淸淨如浮雲雖往來而太虛之體自若其虛極矣致即致中和之致主心言而心中之性原靜也前念靜後念不靜未守靜也即靜之中猶有纎微倚著亦是守靜不篤也故必虛而又虛靜而又靜然後可謂之致虛極守靜篤也並作猶言並生也吾不觀其作而觀其復觀復者在易為雷在地中在十二辟卦即為十一月之復卦在堯夫則為月窟天根在玄門則為五行不到處父母未生前在禪門則為本來面目凡人止知觀泰觀乾不知觀復任其至剝至坤純陰而命終矣不知物雖藝藝枝葉扶疏而終各歸其根夫春生夏長皆動時至歸根則靜矣乃觀復之時是謂復命矣物能歸根復命者松柏靑靑百千歲而不朽何為人獨不知歸根復命乎歸根是得藥事復命是得丹事太上明以大道指點世人先哲注道德經皆夢中説夢常者常常如此人至死日曰無常故復命曰常可與天地同久人患不知此常道耳能知此常道曰明明者不啻明見致虛守靜之理歸根復命之竅且明從日從月一陰一陽之謂也若不知常明之道而妄作行旁門者必凶知常容即一粒粟中藏世界洞裏乾坤大壺中日月長也容乃公即仙佛之欲度世人甚於世人之求仙佛也人王主宰天下天王主宰造化公乃王所謂跳出陰陽之外陶鑄造化而不為造化所陶鑄也王乃天我心即天心天乃道我道即天道道乃久我命即天命沒身即解脫也萬物有壞這個不壞何殆之有白祖曰形中以神為君神乃形之命也神中以性為極性乃神之命也養形中之神以合神中之性此之謂歸根復命也知常之人道同太上故次之以太上淳風章第十七太上心之精神是謂之聖下知有之萬物皆有此理其次親之譽之有物生天地無名本寂寥可親可譽便不自然其次畏之百姓日用而不知也知其畏敬其次侮之寂然不動感而遂通全無忌憚信不足不知有此理只為太分明有不信平常心是道不用生分別前行後必隨猶其貴言尚何言哉功成事遂此理素存此心素有百姓皆謂我自然圓陀陀光灼灼淨裸裸赤灑灑復圭子曰太上謂太上之世結繩而治也下民不知親己不知疏物僅知上之有君長而已是愛憎之心尚未起此無為而治也其次有為而治以恩結民故民始知親之譽之乃歡虞氣象其次以法令繩民民格面而不格心第知畏之其次令繁禁多未免凌侮生焉而爭奪起矣信不足焉始由君不信其民有不信民便不信其君上下不相信而猶貴言語以相籠絡人此必不得之數孰若執古御今以太上自處以無事治天下功成事遂百姓皆謂帝力何有於我哉自然而已無論無畏侮併親譽亦不知也大道無為親愛畏侮之情生以致大道分裂故次之以大道廢俗薄章第十八大道廢自昧固有之心本來之性有仁義非其本真智慧出終非本然有大偽即不自然智慧聰明根塵業識六親不和自相分別有孝慈蓋所當然國家昏亂生死岸頭身心茫然有忠臣到此方知有所養也莫若常和莫若常治復圭子曰大道無形即道亦不得已而強名也安有仁義自仁義之名立人爭趨之世與道交相喪矣故曰大道廢有仁義道無雕琢安有智慧自上用禮樂法度以治民皆智慧也智慧一出輒有大姦似忠大詐似信者併智慧竊之故曰智慧出有大偽道既無仁義智慧又安有孝慈與忠名哉大道乾坤為父母編民為赤子渾然而已自六親不和各親其親各子其子而後孝慈見大道之世君曰俞臣曰都君曰吁臣曰咈安見其所謂忠自國家昏亂是非顚倒而後忠臣顯蘇文定曰堯非不孝而獨稱舜堯無瞽叟也伊周非不忠而獨稱龍逢比干無桀紂也大道廢而仁義彰智慧出而大偽作故次之以絶聖棄智還淳章第十九絶聖任其天然棄智寂然無念民利百倍淸明在躬志氣如神絶仁聽其自爾棄義遑恤其他民復孝慈安時處順絶巧忘機棄利泯慮盜賊無有心兵不起方寸湛然此三者忘形以養氣忘氣以養神忘神以養虛以為文不足使其使然孰若自然故令有所屬應無所著洞然無我見素抱朴少私寡欲見素抱朴復圭子曰此承上文國家昏亂來其將何以教之蓋聖智即智慧也上人恃聖智以治天下而天下人以大偽亂聖智不利孰甚焉故絶聖棄智民利百倍大道包羅仁義亦無親疏自分別以仁義而民反失其真性故絶仁棄義以還大同而民亦歸於孝慈機械也計較也總之為巧利也吾以巧利生心則五賊盜其內而泰宇不寧姦宄尤而效之所謂兵莫懾於志故絶巧棄利盜賊無有此聖智仁義巧利之三者盡文飾也皆絶而去之是質有餘而文不足故令天下專屬於朴素自然少私寡欲矣如是則大道可存而不廢其庶幾大道之世乎尚仁義聖智而大道始廢故次之以絶學無憂異俗章第二十絶學無憂無事無為無思無慮唯之與阿一氣聚散相去幾何所過者化善之與惡一念動靜相去何若所存者神古今間隔離道甚遠人之所畏生死亦大矣不可不畏死生事大無常迅速善惡可畏荒兮其未央哉流浪生死沉滯聲色俗人恐學力未至聖人恐損之未盡衆人熙熙守真之志不堅逐物之情易蕩嗜欲無厭如享太牢於道無味飢思啖牛如登春臺恣縱情欲我獨泊兮其未兆專氣致柔能如嬰兒淡然無欲如嬰兒之未孩冥冥然而無所知寂寂然而無所為乘乘兮若無所歸應無所住而生其心衆人皆有餘不知戢斂而我獨若遺惟恐失之貪務者常憂忘機者常樂我愚人之心也哉離種種邊沌沌兮離空亦空昏昏默默俗人昭昭耳目所娛內真已喪我獨若昏終日如愚俗人見識於外聖人藏明於內俗人察察用心不已勞神不止我獨悶悶若有所思實無思者俗人心細聖人量大忽兮若海道無邊際漂兮若無所止一心自如萬物無著衆人皆有以一人之心有限萬機之事無窮我獨頑似鄙身如稿木心若死灰衆人皆有能聖人獨無能我獨異於人道不遠人人自遠道不與萬法為侶而貴食母大道一而已矣貴在味道返本李息齋曰學不至於無所學非絶學也道以無得為得學以無學為學使道而可得皆仁義也使學而可學皆名數也故聖人以無得為得道以無學為真學故絶學無憂若未至於無學則未免有得此遺彼之憾學無時可息矣同為應對唯恭而阿慢其相去幾何同為離性善之與惡其相去何若唯阿善惡毫釐有異得失遽相懸如此可不致畏於幾微哉生死事大人雖知畏而不思避畏惟至人非徒知之且實畏之勿使無常一旦臨也不可不畏敢曰今尚未央而可荒哉沈蛟門曰衆人溺於所好心憒乎內目眩於外如享太牢之滋味如登春臺之美麗至人深究其妄自守其中淡然泊然不動不兆若嬰兒百日之前含德未孩之際心融形釋如虛舟之泛泛木葉之飄飄不知風之乘我我之乘風而若無所歸也世人徇其所知自謂餘財以為奢餘智以為詐至人粳皮名利心如虛空無乎不忘故曰若遺終日如愚不虧其神故曰沌沌兮而無分別世人用神於外昭昭若揭日月而行至人靈光內燭披褐懷玉故曰若昏世人嚴明苛刻見察淵魚至人𥥆𥥆冥冥似知不知故曰悶悶海之為物無涯無岸至人之心不滯方隅離諸邊徼故曰忽兮若海漂兮若無所止以用也衆人貴有用之用而至人獨貴無用之用形若稿木而心如死灰故獨頑似鄙復圭子曰嬰兒在母腹中惟以母為食既離母體猶然食母也及其漸長食世味而已能知貴食母者天下有幾人哉非鍾天地之間氣超出名利之奇男子度越凡塵之偉丈夫必不知也此母乃先天真一之氣原在母腹中來也至十六歲而母氣完後漸琢耗而母氣幾亡矣大修行人果能食母以復先天之氣則築基在此結胎解脫亦在此學人不可不知釋德淸曰此母字指虛無大道能生天地萬物是道為母而物為子食乃嗜好之意衆人背道逐物如棄母求食於子聖人忘物故獨求食於母王純甫曰絶學無憂豈誠莽莽然無所用其心哉蓋所絶者世俗之學而所貴者食母之學也我獨異於人德之大也故次之以孔德之容虛心章第二十一孔德之容大無不包惟道是從細無不入道之為物惟恍惟忽不可以知知不可以識識若存若亡人莫可測忽兮恍兮即心即道其中有象恍兮忽兮即道即心其中有物𥥆兮冥兮心與道合其中有精其中有象其中有物其中有精此即真空而後實有也其精甚真其中有信自古及今心無所始亦無所終其名不去人能弘道非道弘人厯劫長存以閲衆甫萬物之中惟道為大吾何以知衆甫之然哉五行之中人為最靈以此以此審知萬物皆道之精氣所生非道則不然也復圭子曰首言道不可道又不可名無為天地之始無之以為用恐人認道為虛無故此章專言無中之有以破玄虛之障道無形容一可形容即屬之德然知德容則道亦可從而識矣道之狀若何恍似有也居有非有忽似無也居無非無有無難定矣然且無象之中似有物象故曰忽兮恍其中有象為萬物法象也恍兮忽其中有物為萬物體質也𥥆兮冥兮其中有精純一不雜也其精甚真不事粉飾也其中有信大無外小無內遠徵天地近取身心無一不應驗也自古及今天地長存則此道亦長存故其名不去閲厯也甫美也衆甫指天地萬物稱衆甫者見物無非道之義然者所以然也吾何以知衆甫之所以然哉知之以此道耳薛蕙曰閲者自門出者一一而數之喻道猶門萬物皆由此而往也漢書此如傳舍所閲多矣陸機賦川閲水而成川世閲人而為世其用字之義並同一訓言衆甫一一由道而往道則不與之俱往也故曰自古及今其名不去以閲衆甫衆甫可謂至多吾所以知其然者以其同出於道得其母則知其子矣曲全枉直窪盈敝新接上章孔德之義也益謙章第二十二曲則全性不可窮委曲從就於人全自本真不為外物所虧枉則直神不可測枉者曲已而伸他則能直也窪則盈心不可盡謙則受益敝則新以心盡心悔則自新少則得以性窮性取少棄多從簡得易多則惑以神測神事繁則亂是以聖人抱一為天下式心即性性即神神即道一能總衆不自見故明見見之時見非是見見猶離見見不能及不自顯已之明而用人之明其明乃大不自是故彰多少分明不自伐故有功心上工夫何分彼此忘其功則存其功不自矜故長寸心不改終古長存夫惟不爭守柔忘我故天下莫能與之爭我尚自忘何况非我古之所謂曲則全者性不可窮豈虛言哉是真實語誠全而歸之一念既正無往不正不自見以下皆謙退之義謙則無爭無爭則全歸本然之朴矣復圭子曰曲與全對枉與直對窪與盈對敝與新對得與惑對嘗觀草木含芽人生始胎何其曲也而他日枝幹完百骸備必委曲方周全豈非曲則全乎一陽初復於地下鬱而不伸者枉也先儒謂不翕聚則不能發散發散則直遂矣地窪下水聚之人謙下德歸之故曰窪則盈物久則敝敝極更新時久亦敝敝極自新故曰敝則新少與多反得與惑反乾易知斯無不知坤簡能斯無不能學有專業道有專門可不謂少則得乎夫道不欲多多則雜財多惑於所守學多惑於所聞可不謂多則惑乎是以聖人不務多而務少一則少之極矣見素抱朴少私寡欲致虛守靜歸根復命皆抱一事也為天下式則欲人人如我之抱一矣抱一者嘗與道俱不自見而因人之見斯無所不見故彰有功而不伐故天下歸功有長而不矜故天下稱長總之自見自是自伐自矜皆爭端也一人安能與天下爭不見不是不伐不矜則不爭矣天下人莫能與不爭者爭以上四者皆曲則全之道不惟於今為然古之所謂曲則全者豈虛言哉誠全而歸之不全於全之日真所謂曲則全也夫全非獨自全也內以全已外以全物物我兼全而復還故吾抱元守一可以為天下式矣李息齋曰物不可以終曲故曲則全物不可以終枉故枉則直窪則必盈敝則必新少則易得多則易惑此盈虛消息之至理聖人所以能為萬物宗者以其抱一也抱一者常與道俱故不自見而因人之見不自是而因物之是不自有其功而因人之功不自矜其長而因人之長惟其立於物之獨而不與物爭故天下莫能與之爭聖人循理而動求其不全不可得以未嘗不全而又能致曲以養之其全之也至矣是謂誠全而歸之不矜不伐不爭持重希言故次之以希言自然虛無章第二十三希言自然無可説得飄風不終朝有為者也狂則不久驟雨不終日何可長也躁則不長孰為此者天地終不可久也是誰主宰衆所共知天地尚不能久天地萬物無非幻妄而况於人乎惟此心為實餘者即非真不可躁暴故從事於道者了心而已不當如風雨之卒暴道者同於道無思即道一體同觀德者同於德為無為不生二見失者同於失忘所忘無有分別同於道者道亦得之我同於道道亦同我同於德者德亦得之我同於德德亦同我同於失者失亦得之我同於失失亦同我信不足焉自信不及有不信焉日中逃影疾走渴死惟知道者不以得失疑道呂吉甫曰此接上章不爭之義聽之不聞名曰希言而知其所以言則言出於不言而聽之不聞矣故曰希言希言者以道言也故曰自然飄風驟雨成於暴戾非出於自然也天地為之而不能終朝終日人之言不出於自然則多而數窮宜矣復圭子曰人當安靜希言不當如飄風驟雨希言即是道惟聖人從事於道妙契玄同與有道者同於道有德者同於德豈惟不作道德想亦不作得失想故可同有道德者樂得亦可同無道德者樂失得失渾然而已世人見不到以道德分曹得則喜而失則悲嘵嘵多言何為哉此無他以自信不足所以人不信耳證前二章飄風驟雨自見自是矜伐渾是私意私不能久故次之以跂者不立若恩章第二十四跂者不立心如牆壁乃可入道跨者不行心性無染體露真常自見者不明凡所有相皆是虛妄自是者不彰不可以聲色求不可以名相見自伐者無功百念雲消而風止寸心霜降而水涸自矜者不長真靜妙明虛徹靈通其在道也曰餘食贅行仁者見之以為仁知者見之以為智物或惡之瞥起是病不續是藥故有道者不處也不怕念起惟恐覺遲釋德淸曰此承上章多言者不能持久猶跂跨之人不能立行跂足跟不著地也跨闊步而行也蓋跂者止知要高人一頭不知不能久立跨者止知要出人一步不知不能久行以其欲速皆非自然以此二句為下四句之譬喻耳自見謂自逞已見自是謂偏執已見此一曲之士於道必暗而不明自伐謂自跨其功自矜謂自炫其能此皆自私好勝之人不但無功而且速於取死此道中本無是事故曰其在道也如食之餘如形之贅此人之所共惡而有道之士以謙虛自守必不處此故曰有道者不處以其不能合乎自然也上章有道不處故發明處道工夫曰有物混成象元章第二十五有物混成先天地生有物混成寂兮寥兮先天地生獨立而不改朗然獨存周行而不殆無窮無盡可以為天下母能生天地吾不知其名字之曰道強為之名曰大無邊大曰逝無著無有疆界逝曰遠無盡無有邊際遠曰返無住收拾得來故道大天大同乎無始地大同乎無終王亦大心君也域中有四大上無復色下無復淵靈照獨存玄之又玄而王居其一焉即心是道人法地有所依據河上公云氣和種得五穀土滋掘得甘泉地法天一靈妙有法界圓通湛然不動自然生育天法道淸虛密運道法自然道如斯而已復圭子曰此發揮大道之妙而為有道者之所處也當混沌未鑿果孰主張是實有一物混成完具徹上徹下周流磅礴先天地生寂兮無聲可聞寥兮無色可見獨立無匹常存不改殆盡也危也一氣周流而無窮盡天地萬物皆從此中生故曰可以為天下母此物至玄至妙吾不知將何以名之字之曰道己不得已強為之名曰大其有限量乎大曰逝無有執滯逝曰遠無有邊際遠曰返收拾得來杳出八荒之外而逐之不逮返入靈府之內而潛之益深周而復始遠而復近歸而求之人心足矣有物混成先天地生故道大而後天地大也有天地而後有王故王亦大也域中有四大道與天地王是也而王居其一此王非天王人王乃身中之真君王主於一身是也玄同子曰備閲諸家注疏人法地地法天天法道道法自然浮泛帶過似未愜當愚以謂地有真氣則能時其生長成熟厚重悠久人則之而成道故曰人法地天有真息則能序其寒燠溫涼風雷雨露地則之而成歲故曰地法天道有真常則能圓其虛靈妙有澄湛真空天則之而成運故曰天法道自然者則如此而已道亦如此而已故曰道法自然雖有地天道之序而無階便是精氣神之分而合一人能抱一則精化為氣氣化為神神返合虛即是人法地人法天人法道而入自然之妙境也歟不離錙重克復擔荷燕處超然轉物而不為物轉以明上章法道之義重德章第二十六重為輕根心為萬物之宗靜為躁君道為一心之體龍靜能變化虎躁乃夭亡是以聖人得道之士終日行持心抱一不離錙重惟恐喪失不敢輕為雖有榮觀無所貪著燕處超然心超物外居常靜重奈何萬乘之主心也而以身輕天下戀有貪生輕則失臣情欲所使躁則失君無所持守貪榮取辱河上公曰人君不重則不尊治身不重則失神草木之華輕故零落根重故長存人君不靜則失威治身不靜則身危龍靜故能變化虎躁故夭虧是以聖人終日行道不離其靜與重也榮觀謂大庭燕處后妃所居超然者不染不著也奈何萬乘之主恣情徇欲而以身輕天下乎王者輕淫則失臣治身輕淫則失精王者躁動則失君位治身躁動則失其精神也李宏甫曰有錙重則雖終日行而不為輕何也以重為之根也嘗燕處則雖榮觀而不為躁何也以靜為之君也故輕則失重根躁則失靜君復圭子曰鉛性沉重而喜墜汞性輕飛而喜升以鉛制汞是以沉重而制輕飛內丹結矣故曰重為輕根身靜則氣定氣定則了命心靜則神全神全則了性而一了百了矣故曰靜為躁君是以得道之聖人終日行者行火候也錙重即河車北方正氣號曰河車載金上升度我還家不離錙重者時時河車運轉以鉛制汞是重為輕根也雖有榮觀者大庭廣衆之中無欲以觀其妙所謂真空不空也燕處即入室也有欲以觀其竅燕處超然而不染所謂真色不色也是靜為躁君也萬乘之主指主持丹道者言借來喻修道者之身貴重如萬乘也以天下視天下則天下重以身視天下則此身重奈何萬乘之主視此身輕於天下乎鉛重為君汞輕為臣此身輕搖其精則汞飛而臣失矣靜為躁君而躁不能君靜汞既躁而飛鉛必走而墜矣此章語語皆金丹細味惟在學者煉已立基以體貼之耳輕則失臣躁則失君猶跂跨風雨之喻總結二章法道體道之説續下章善行之義巧用章第二十七善行無轍迹以心知心善言無瑕謫以性覺性開口不在舌頭端善計無籌策以神全神一徹萬融善閉無關鍵而不可開合神於無善能守道者外想不入內想不出無關無閉無出無入善結無繩約而不可解合於無道全無繫纍是以聖人心一而已常善救人視人猶己修己安人故無棄人凡關有生均氣同體常善救物見物便見心見心便見道隨機利物故無棄物心超物外而不外物賢者掖之愚者教之是謂襲明定能生慧睿可作聖故善人者正己處物不善人之師物自物我自我不善人者不可離生死而求心亦不可脫心而離生死善人之資生死自生死此心自此心不貴其師道無可學心無可用不愛其資寒灰枯木雖智大迷一念萬年屏智如愚是謂要妙與道合真復圭子曰此章言聖人善行大道過化存神之妙夫人以行為行車行有轍步行有迹惟以不行為行者行滿天下無身過此之為善行夫人以言為言言而盡道恐有瑕言不盡道恐有謫惟以不言為言者言滿天下無口過此之為善言用籌策以揣世務未免得此而遺彼吾大其心以體物無籌策而天下之籌策不能外計孰善焉仗關鍵以固精神者可閉亦可開吾空其心以忘物無關鍵而天下之關鍵不能過閉孰善焉恃繩約以聯屬人情者易聚亦易散吾悠其心以成物無繩約而天下之繩約不能踰結孰善焉民吾同胞也無擇人而救無棄人而不救斯為善救人物吾與也無擇物而救亦無棄物而不救斯為善救物襲掩也禮記裘外加衣謂之襲裘則襲明還是掩明而不露也况上文無轍迹等語皆是不見而章不動而變無為而成的光景一般聖人視善與不善為一間故善可為不善師師者法其儀的也視不善與善不甚相遠故不善可為善人資資者資藉其攻玉也若不貴其師無善可為也不愛其資無過可改也雖智大迷即大智若愚之謂非襲明者能之乎此之謂無善無不善師資兩忘天下之妙曷以加此守雌守黑守辱不見自已之明接上章雖智大迷之義返朴章第二十八知其雄神也守其雌性也為天下溪心廣體胖不自高大萬派歸源為天下溪深妙常德不離顚沛必於是造次必於是復歸於嬰兒無念知其白性也守其黑命也為天下式空即合無專氣致柔為天下式見聞知覺盡皆空寂常德不忒道在萬物凖定不差復歸於無極知其榮心也守其辱我也為天下谷但可空諸所有不可實諸所無為天下谷虛中常德乃足身心自如身外無餘湛然圓滿復歸於朴大易無極如此則性全朴散則為器易有太極是生兩儀萬物之朴散則為器用道散則為神明流於日月分為五行聖人用之知有此理則為官長知有所畏設教化人故大制不割心同虛空虛空非心王純甫曰天下之事固有時而當用剛有時而當用明有時而當用貴此常人之所以必知雄知白知榮也然剛不制於剛而制於柔明不藏於明而藏於晦貴不基於貴而基於賤是剛也明也貴也物之末也子也柔也晦也賤也物之始也母也此聖人之所以守雌守黑守辱也而天下之母歸之矣其子焉往所以為溪為谷為式而天下歸之復圭子曰此一章知雄守雌知白守黑知榮守辱十二字乃徹上徹下語也學道者得之則可以出有入無而長生久視有德者得之亦可以獨往獨來而登道岸顧人所得之淺深何如耳聖人知天下之不可上也而下之知雄守雌也是謙下如深溪常德不離無時不然也復歸於嬰兒併雌雄亦不知矣知昭昭之不勝其冥冥也以養晦知白守黑也是潛德可模常德不忒溫而理也復歸於無極併黑白亦不知矣知繁華之不堅久也而去華就實知榮守辱也是藏垢納汙為天下谷常德乃足知足不辱也復歸於朴渾然不雕併榮辱亦不知矣若朴散斯雌雄黑白榮辱分而道器亦分矣聖人用之以治世也則有官長而尚雄尚白尚榮矣非大制也故大制不割猶然守雌守黑守辱復歸於嬰兒也無極也大朴也愚前所注皆吾儒眼前之理未得老君之神若以老解老則刀圭入口羽翰自生更請伐骨洗髓可乎道家陽丹一粒産於坤宫則雌矣然雌中之雄是謂大雄故聖人知雄而守雌我沉而彼浮為天下溪也皆不離日用尋常之德至復歸於嬰兒則純陽矣白者金精西兌也母隱子胎尋體於坎黑者水基北坎也金生水水中有金故聖人知白守黑神明自來凡學道者誰不是法是則乎常德即守雌之德不忒者火候分毫不爽也復歸於無極者完此太極之體也五行順行金常克木五行顚倒金伐木榮釋氏謂忍辱仙人漆園吏云香從臭裏出甘從苦中來聖人知榮而守辱似谷之無所不容而常德無欠無餘火候足也渾然如朴之未雕復歸於一所謂及至無為衆始知也若朴散為器則一生二二生三三生萬物矣聖人知此理官天地而府萬物未免有所制作故大制則不然不失本來面目而豈肯割裂剖析以傷混沌哉無為則無敗無執則無失接上章守雌守辱之義無為章第二十九將欲取天下而為之欲行此道吾見其不得已道本無為天下神器心之所居不可為也無作無止無任無滅為者敗之道本圓成貪他的著他的執者失之愚者逐於外賢者執於內聖人皆偽之吾亦非聖人故物或行或隨念茲在茲或噓或吹思無邪或強或羸善用其心或載或隳精思此理有此便有彼切忌隨他去是以聖人我也去甚過猶不及去奢常道如如去泰道無不足去為者執者之敝而以自然輔自然玄同子曰丹經皆指身為國精為民則天下亦國也言天下之道即言治身之道也聖人以淸靜治身以無事治天下此太古之世醇龎之民固可無為而治也及至世降道漓禍生變起若玁狁之作祟蚩尤之興戎則其為之也吾見其不得已不得已而為之之心亦大彰明較著於天下矣但天下雖大號為神器人神好靜而以有為擾之則神不寧矣故曰天下神器不可為也道本不著而妄為著之者必敗道本圓通而固執逐之者必失凡物一切或行於前而不知隨者之在後或噓之欲溫而不知吹者之已寒知今日之強而不知他日之羸知前車之已載而不知後車之且隳種種變幻皆有為也惟聖人能於不得已之時為無為去甚也能於不得已之時欲無欲去奢也能於不得已之時執無執去泰也無論治身與治天下無二道也以道佐人主者不尚兵武接上章去奢去泰之義儉武章第三十以道佐人主者道與合心不以兵強天下善勝在於不爭其事好還歸根復命恃兵強者禍必不遠師之所處心兵所處荊棘生焉心荒神狂大軍之後心與物馳事與心戰必有凶年情欲馳驅神氣昏耗故善者果而已矣定力所到不敢以取強忘我而已果而勿矜靜以待之莫誇高大高而必危果而勿伐默而守之莫自取美美極必變果而勿驕存之以和傲人人傲欺人自欺果而不得已用之以虛以理止敵濟難非求勝人果而勿強虛無自然物壯則老心為物移草木壯極則枯人壯極則衰強者不可以壯是謂不道性為心所蔽不道早已神為性所窒永失真道呂吉甫曰人主者無為也佐人主者有為者也取天下不能無事而欲以強勝天下未有不反乎爾者也蘇子由曰楚靈齊湣秦皇漢武或以殺其身或以禍其子孫未有得免者也兵之所至民事廢故田不修用兵之後殺氣勝故年穀傷凡兵皆然况以兵強者耶果決也德所不能綏政所不能服不得已而後以兵決之耳不敢以取強故果而勿矜去甚也果而勿伐去奢也果而勿驕去泰也果而不得已無心之果也果而勿強自然之果也豈敢以取強乎哉若夫壯則必老物無不然者惟有道者成而若缺盈而若沖未嘗壯故未嘗老死以兵強天下者壯矣能無死乎復圭子曰此章先哲皆從人道上看猶之可也惟白祖師俱以大道注之濬其源也弟子敢不揚其波乎身為國心為君人主也故學道者欲以道佐心君自有上善若水至柔至弱之道守雌也守黑也守辱也不以兵強天下不露鋒芒也其事好還好返本還元也歸根復命也師之所處荊棘生焉心兵起處靈地荒蕪也大軍之後必有凶年魔軍馳騁精氣耗散也故上善雖至柔果而已者弱其志強其骨也釋氏之金剛道家之鐵漢也不敢以取強即挫鋭解紛和光同塵也果而勿矜去圭角也果而勿伐忘功德也果而勿驕化意氣也果而不得已無容心也果而勿強任自然也總一果而已也總一不敢以取強也直為壯曲為老師老必潰物壯則老老者必死是謂不道不知佐人主攝生之道心地荊棘生也維天之命於穆不已已止也不道早已者有道則長存無道則早已自然之理也不以兵強天下故次之以佳兵不祥之語偃武章第三十一夫佳兵者不祥之器以心勝物終莫能勝驚精神濁和氣不善之器故不當修飾物或惡之為物所誘故有道者不處不離生死而離生死是以君子居則貴左忘心主柔用兵則貴右任真主剛兵者不祥之器不得已而用之非君子之器觸來勿與競事過心淸涼非君子樂用之器不得已而用之欲求合道乃不合道不幸用兵以自守護恬淡為上寂然渾然一寂寞無為之境勝而不美欲求凝神神乃不凝兵者是不好之事也而美之者用志不分乃凝於神是樂殺人用心一處無事不濟要其功名肆其剛勇夫樂殺人者絶欲不可得志於天下矣凡百從儉不嗜殺人者能一之故吉事尚左不可師心左陽生位也凶事尚右當為心師右陰殺位也偏將軍居左省心主生故居左陽上將軍居右全神主殺故居右陰言以喪禮處之若論此事如喪考妣殺人之衆六賊之兵已息三尺之火不焚以悲哀泣之心死神活傷已德薄不能以道化民而害無辜之人戰勝則以喪禮處之孤光獨露明君子貴德而賤兵因不得已而追不善也復圭子曰此章大旨全在恬淡為上與不樂殺人也夫人一身不出陰陽二端兵乃我之陽神能戰退羣陰是殺已也已私殺得盡方有陽而無陰矣夫天生五材民並用之誰能去兵然兵可用也不可佳也愈佳則愈為不祥之器矣以之自治乃心兵也不鋒刃而利不器械而威何惡於兵倘佳兵藉器宜為物之所惡故有道者不處是以君子居則貴左法天之左行易曰天行健君子以自強不息用兵則貴右法日月之右行兵家用正為陽用奇為陰用兵之道無出陰陽而已矣兵者不祥之器形而下之之謂也是境殺心則凡也非君子之器以君子之器則道也形而上之之謂也是心殺境則仙也不得已而用之以自治惟以恬淡為上無私可攻無欲可尅渾然一寂寞無為之境界不必戰勝而自然淸靜待戰而後復此本體便為下德而不美矣若以戰勝為美便有樂殺人之心夫樂殺人者不可得志於天下以尚兵器而不尚道器也若君子之器則不樂殺人而樂自殺如下文自知者明自勝者強是也故吉事尚左取東方之生氣凶事尚右取西方之殺氣偏將軍居左乃東方木處柔而聽令也上將軍居右乃西方金處剛而制殺也言以喪禮處之以悲哀泣之者哀其勝人而不能自勝也戰勝以喪禮處之何也蓋用兵不勝則喪國幸而得勝所喪元氣亦多矣理欲交戰不勝則喪心幸而得勝耳目口鼻非吾有亦喪我矣非無為也總未若恬淡為上不戰而勝之為美也蓋靜中行持左進陽火陰極生陽陽中有陰陰反為主陽反為賓非得真人口訣未易解也君子所貴恬淡無為乃道之常故次之以道常無名聖德章第三十二道常無名河上公云道能陰能陽能弛能張能存能亡故無常名也朴雖小亦甚大天下不敢臣道為萬化之君侯王若能守守一萬物將自賓心為主物為客天地相合身心如一以降甘露大道得矣和氣所致民莫之令而自均心無病而身自安心無為而神自化始制有名道也是朴散而為器也名亦既有心也羣有盡含此朴夫亦將知止性也依止於道朴不使遷流知止所以不殆命也知止則不循名而逐末譬道之在天下心之在我猶川谷之與江海萬物歸一歸一而已千枝萬葉共一本根復圭子曰常道不落擬議故無名以其未雕未琢故謂之朴以其曰希曰微故謂之小而天下不敢臣夫何故天地資之以始萬物恃之以生天下孰有敢臣其所自始與所自生哉匹夫得道尚能使其所居之地物不疵癘而年穀熟也侯王若能抱朴而守一則靜為動君一為萬主萬物有不賓服者哉天地相合水火交也以降甘露神水入華池也民莫之令而自均言人人可能第人身之天地不合安望其甘露降哉朴尚無名若朴散為器始制則有名矣道也誠知無可適有則有亦可以之無是故貴知止止者鎮以無名之朴也知止則不隨物遷淡然自足危殆安從生譬道之在天下朴不能不散而為名水不能不分而為川谷顧名立而知止非朴亦復於朴川谷分而為江海江海非源亦復歸於源然則道雖無名遠取諸物不若近取諸身川谷即人泥丸宮之瑤池也太淵池也津液之山源也江海即人之氣海也曲江也華池也丹家所謂氣歸元海夀無窮是也證前二章用兵之戒知人勝人明於外不若自知自勝存於內辨德章第三十三知人者智不為物所轉也自知者明以心合道見於內也勝人者有力久於其道而化自成自勝者強真積力久勇於不敢則活知足者富何物非道貧亦樂也強行者有志有志者事竟成始終不殆不失其所者久性常存也死而不亡者夀神不死也真一常存天行健君子當自強不息復圭子曰此章八句一主一賓一淺一深不得一概穿鑿而以妄見強解也知人者智見於外也不過識人之善惡優劣而已自知者明見於內也非返聽無聲內視無形者不能也勝人者有力勇於敢也不過膂力血氣之剛而已自勝者強勇於不敢也非克己復禮中立不倚者不能也鷦鷯巢於深林不過一枝偃鼠飲於河不過滿腹可不謂知足者富乎子貢之請息冉求之自畫由無志也若顔子之請事斯語自強不息可不謂強行者有志乎徙業則無成無恆則不永若不為事變不為物遷基址堅固方為不失其所者久也死則死矣何以又曰死而不亡丹經云心死則神活魄滅則魂昌此死乃形死仙家解脫是也若真精神則不死不生此所謂死而不亡者夀也又云道氣長存是也然而平日工夫皆從自知自勝自強有志不失其所積纍而來志於道者不可不知大道為萬物所恃以生而不辭接上章不失其所者久之義也任成章第三十四大道泛兮心無方所廣大悉備其可左右了無所知可左可右無有限量萬物恃之以生而不辭大道無生不免於生萬化自生大道無生所過者化功成不名有實無所得愛養萬物道能育物而不為主忘其所自道無偏私故常無欲而不為主可名於小矣道雖小含萬物萬物歸焉人能虛心道自歸之而不為主尚自不見乎我將何有於我哉任運自然可名於大矣何所不容是以聖人心也終不為大粟子藏世界芥子納須彌故能成其大諸佛法身入我性我性同共如來合李息齋曰大道泛兮充滿八極及其用之如在左右即取之左右逢其源之意萬物非道不生而道未嘗辭其勞萬物非道不成而道未嘗名其功萬物非道不養而道未嘗自以為主復圭子曰大道無名著一道字已為強名吾從無欲處觀之道無欲故能使萬物各厭其欲則無小不入而名於小可矣吾從萬物歸焉而不為主處觀之道忘主故能使萬物各得其主而大無不包而名於大可矣第化育有到不到而參贊之功無不到即聖人亦不知其到也此終不為大即丹經及尋其根源一粒如黍大是也故能成其大即丹經會得坎離基三界歸一身是也大道泛兮乃極廣大而盡精微故次之以執大象天下往仁德章第三十五執大象天下往萬物歸焉往而不害道無鬼神獨往獨來安平泰心安則性平性平則神泰萬民遂萬化安也樂與餌從心不踰矩過客止邪念自絶道之出口淡而無味淡乎其無味無味之味無聲無臭視之不足見道無形聽之不足聞道無聲用之不可既道無盡釋德淸曰無象謂之大象大象無形而能入衆形有形者無不歸聖人執無我以御天下故天下莫不往以其與物同體也萬物恃之以生無往而不利故云往而不害然忘於物者物亦忘之故物各得其所無不安物物相忘而無競故無不平暖然如春故無不泰復圭子曰此承上章末句來大象者道也夫能執古之道以御今之有則天下萬物皆歸往之矣不害猶並育而不害也天下各得其所欲而來各厭其欲而往安也平也安平之極則泰矣玄同子曰樂與餌餌者凡聲色貨利靡麗繁華可以移人志而樂人心者皆餌也吾執大象以往尚有何物可以餌吾衷而樂其餌耶即有餌吾者吾姑以樂與之彼邪幻之過客當自銷形滅迹於無象之外止而不前所以執大象之道淡若無味而無味之味為大味視若無形而無形之形為大形聽若無聲而無聲之聲為大音變化無方廣大無際而用之不可既故能成其大用之不可既者乃微明之利器也即翕張強弱廢興與奪之妙用微明章第三十六將欲吸之必固張之一闔一闢將欲弱之必固強之一動一靜將欲廢之必固興之若存若亡將欲奪之必固與之舍用得宜是謂微明幾微先兆復圭子曰此章止以柔弱勝剛強一句為主翕聚也張大也開擴也心體不先開擴致廣大則不能翕聚而盡精微此所以欲翕而先張也弱之挫其鋭也強之鼓舞其精神使不倦也工夫必先有作有為方能造到專氣致柔此所以欲弱而先強也廢是廢耳目墜肢體黜聰明也興是興其師旅出我之陽神戰退羣陰而後百念消融則欲廢而安得不興乎奪是奪造化之權盜天地之氣與是靜而與陰同德動而與陽同波則欲奪而安得不與乎其理甚明而其機極微此之謂微明夫人神至柔也神能入金石而無礙入水火而不溺不焚天下之柔弱莫過於水而攻堅強者莫之能勝故曰柔弱勝剛強人範圍於陰陽之內猶魚之在淵而不可脫淵國之自操其利器而不可示人以利器也聖人則跳出陰陽之外如龍之躍淵變化而不測也宇宙在乎手萬化生乎身敢有貪天功以為已力者無有哉呂知嘗曰天之道物之理人之事其勢未嘗不如此者也於張知翕於強知弱於興知廢於與知奪非知機者孰能與於此哉故曰是謂微明然則能翕張弱強廢興奪與之者無形而柔弱者也為其所翕張弱強廢興奪與之者有形而剛強者也則柔弱之勝剛強明矣人之不可以離柔弱猶魚之不可以脫於淵魚脫於淵則獲人離於柔弱則死之徒而已矣天下之至柔馳騁天下之至堅而入於無間非器之最利者乎操利器以馭天下國家則其所以圖回運動當在於無形之際安可使知其所由來哉故曰國之利器不可以示人柔弱勝剛強正為無為之常道故次之以道常無為為政章第三十七道常無為用之不可既而無不為何所施而不可侯王若能守心生於道萬物將自化萬化自然化而欲作一念欲起吾將鎮之以無名之朴盡知真一處當使六用廢我行道德人亦道德無名之朴亦將不欲道常無為不欲以靜而無不為天下將自正身心一如為無為則無不治沈蛟門曰道常無為者其本體也而無不為者其妙用也寂然不動感而遂通天下之故惟無物然後能物物故貴無為也王侯無為而萬物將自化惟無為之不能耳胡患不化哉顧自混沌鑿而侈肆生情竇漸開繁華日增固欲有所作為矣聖人於是提防之鎮以無名之朴凡一切有為之法如可為可貴可欲可制之名皆卻而不敢為修玄默以鎮之久則無知者無欲有知者亦不敢為而妄作之心自靜矣夫無名之朴亦難言矣聖人內忘抱朴之念外化抱朴之迹夫是之謂真無欲夫是之謂真靜故天下各正其性命之常上無為而下亦無為此所謂無為而無不為之常道
